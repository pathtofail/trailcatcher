        const cx = samplesAreaX + s * sampleW + sampleW / 2;
        const lbl = new PIXI.Text(`${samples[s]}`, {
          fontFamily: FONT, fontSize: 13 * scale, fill: 0x7C5332,
        });
        lbl.anchor.set(0.5);
        lbl.x = cx; lbl.y = headerY + headerH / 2;
        paytableContent.addChild(lbl);
      }

      // Rows — recompute rowH using the post-header content space.
      const rowsTop = headerY + headerH + 6 * scale;
      const rowH = (contentBot - rowsTop - rowGap * (COLORS.length - 1)) / COLORS.length;
      for (let i = 0; i < COLORS.length; i++) {
        const col = COLORS[i];
        const ry = rowsTop + i * (rowH + rowGap);
        const card = new PIXI.Graphics();
        card.lineStyle(1.5 * scale, 0xC08050, 0.9);
        card.beginFill(0xFFF8E6, 1);
        card.drawRoundedRect(rowX, ry, rowW, rowH, 8 * scale);
        card.endFill();
        paytableContent.addChild(card);

        // Color swatch.
        const sw2 = Math.min(rowH * 0.7, swReserve * 0.85);
        const swCenterY = ry + rowH / 2;
        const swatch = new PIXI.Graphics();
        swatch.lineStyle(2 * scale, 0x2A1808, 0.95);
        swatch.beginFill(colorToUint(col.hex), 1);
        swatch.drawRoundedRect(
          swColCx - sw2 / 2, swCenterY - sw2 / 2, sw2, sw2, sw2 * 0.25
        );
        swatch.endFill();
        paytableContent.addChild(swatch);

        // (Symbol names intentionally omitted — internal-only labels.)

        // Sample pays — per-sample pay = basePay × cluster size.
        for (let s = 0; s < samples.length; s++) {
          const n = samples[s];
          const pay = col.basePay * n;
          const cx = samplesAreaX + s * sampleW + sampleW / 2;
          const val = new PIXI.Text(`${pay.toFixed(2)}×`, {
            fontFamily: FONT, fontSize: Math.min(16 * scale, rowH * 0.5), fill: 0x3D1C02,
          });
          val.anchor.set(0.5);
          val.x = cx; val.y = swCenterY;
          paytableContent.addChild(val);
        }
      }

      // Rules content (text).
      const rulesContent = new PIXI.Container();
      rulesContent.visible = false;
      modal.addChild(rulesContent);
      const rulesText =
`The Grid
• 5 × 5 slot grid surrounded by an L-shaped conveyor on the top edge
  and right edge — 10 collectible spots plus a finish.

Cluster Pays
• 4 or more matching symbols touching horizontally or vertically pay.
• Bigger clusters multiply: each cell in the cluster pays the symbol's
  base value × the cluster size.
• Wins clear and refill from above; cascades chain.

The Conveyor
• Each spin, a "raider" character may walk onto the conveyor at the
  top-left corner, travels one cell per spin, and exits at the lower-
  right after 10 spins.
• Cluster cells on the EDGE of the slot grid (top row or right column)
  reach out and intercept the token sitting in that ring position.

Token Effects
• ×N MULTIPLIER — multiplies this cascade's wins, sticks on cluster
  cells for the rest of the spin.
• WILD — turns a whole row or column of the grid into wild symbols
  (sticky for the spin).
• FREE SPINS — adds 3 free spins, played automatically.
• TINY  — pays  5 × bet instantly.
• MINI  — pays 15 × bet instantly.
• MAJOR — pays 100 × bet instantly.
• GRAND — pays 200 × bet instantly.

Win = total cluster pays + token effects + jackpot wins.`;
      const rulesBody = new PIXI.Text(rulesText, {
        fontFamily: 'Arial, sans-serif',
        fontSize: 14 * scale,
        fill: 0x3D1C02,
        lineHeight: 19 * scale,
        wordWrap: true,
        wordWrapWidth: panelW - 80 * scale,
      });
      rulesBody.x = panelX + 40 * scale;
      rulesBody.y = contentTop;
      rulesContent.addChild(rulesBody);

      function setActiveTab(activeIdx) {
        tabSprites.forEach((t, i) => {
          t._draw(i === activeIdx, false);
          t._lbl.style.fill = i === activeIdx ? 0x3D1C02 : 0x7C5332;
        });
        paytableContent.visible = (tabSprites[activeIdx]._key === 'paytable');
        rulesContent.visible    = (tabSprites[activeIdx]._key === 'rules');
      }

      modal.alpha = 0;
      app.stage.addChild(modal);
      scene.paytableModal = modal;
      gsap.to(modal, { alpha: 1, duration: 0.20, ease: 'power2.out' });
    }

    function closePaytableModal() {
      const m = scene.paytableModal;
      if (!m) return;
      scene.paytableModal = null;
      gsap.to(m, {
        alpha: 0, duration: 0.18, ease: 'power2.in',
        onComplete: () => m.destroy({ children: true }),
      });
    }

    // Close paytable on Escape.
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Escape' && scene.paytableModal) closePaytableModal();
    });

    function makeAdjustButton(symbol, onTap) {
      const gs = L.gameScale;
      const r = 22 * gs;
      const c = new PIXI.Container();
      const g = new PIXI.Graphics();
      const draw = (hover = false) => {
        g.clear();
        g.lineStyle(2 * gs, 0xC08050, 0.95);
        g.beginFill(hover ? 0x3A2414 : 0x2A1808, 0.85);
        g.drawCircle(0, 0, r);
        g.endFill();
      };
      draw();
      c.addChild(g);
      const t = new PIXI.Text(symbol, {
        fontFamily: FONT, fontSize: 26 * gs, fill: 0xFFECB3, fontWeight: 'bold',
      });
      t.anchor.set(0.5);
      c.addChild(t);
      c.eventMode = 'static'; c.cursor = 'pointer';
      c.hitArea = new PIXI.Circle(0, 0, r);
      c.on('pointerover', () => { draw(true); gsap.to(c.scale, { x: 1.08, y: 1.08, duration: 0.12 }); });
      c.on('pointerout',  () => { draw(false); gsap.to(c.scale, { x: 1, y: 1, duration: 0.12 }); });
      c.on('pointertap', onTap);
      return c;
    }

    // ── Scene ────────────────────────────────────────────────────────────────
    // Layer order (back → front):
    //   frameContainer  — background panel + cell BGs + conveyor BGs
    //   slotLayer       — per-cell Containers w/ symbols + stamps (MASKED)
    //   conveyorLayer   — token sprites (unmasked, can sit anywhere on L)
    //   fxLayer         — floating texts on top
    const scene = {
      stage: app.stage,
      frameContainer: null, slotLayer: null, conveyorLayer: null, fxLayer: null,
      gridMask: null,
      cellBgs: null, cells: null, symbols: null, stamps: null,
      ringCellBgs: null, ringTokens: null,
      titleTxt: null, balancePill: null, betPill: null, winPill: null,
      betMinusBtn: null, betPlusBtn: null,
      spinBtn: null, infoBtn: null,
    };

    function buildScene() {
      L = layout();
      // Reset stage transform before tearing down children — if a resize
      // fires mid-shake (shakeStage), the new scene would render at a
      // non-zero offset and the UI shifts off-screen.
      gsap.killTweensOf(scene.stage);
      scene.stage.x = 0; scene.stage.y = 0;
      scene.stage.scale.set(1);
      scene.stage.removeChildren();
      const gs = L.gameScale;

      // (Background is the app's flat backgroundColor — no sprite.)

      // Title (warm gold, top centred).
      const title = new PIXI.Text('PLUNDER PATH', {
        fontFamily: FONT, fontSize: 36 * gs, fill: 0xFFD54F,
        letterSpacing: 8, fontWeight: 'bold',
        stroke: 0x2A1808, strokeThickness: 4 * gs,
      });
      title.anchor.set(0.5, 0);
      title.x = L.sw / 2; title.y = 18 * gs;
      scene.stage.addChild(title);
      scene.titleTxt = title;

      // 3. Frame container — backdrop + cell + ring backgrounds. Always
      // visible, never masked.
      const frame = new PIXI.Container();
      scene.frameContainer = frame;
      scene.stage.addChild(frame);

      // Backdrop panel under the whole 6×6 visual.
      const panel = new PIXI.Graphics();
      panel.lineStyle(3 * gs, 0xC08050, 0.95);
      panel.beginFill(0xF5E6CC, 0.92);
      panel.drawRoundedRect(
        L.frameX - 14 * gs, L.frameY - 14 * gs,
        L.frameSize + 28 * gs, L.frameSize + 28 * gs,
        18 * gs
      );
      panel.endFill();
      frame.addChild(panel);

      // 4. Slot 5×5 cell backgrounds.
      scene.cellBgs = []; scene.cells = []; scene.symbols = []; scene.stamps = [];
      for (let r = 0; r < 5; r++) {
        scene.cellBgs[r] = [];
        for (let c = 0; c < 5; c++) {
          const visR = r + 1, visC = c;
          const x = L.frameX + (L.cellSize + L.cellGap) * visC;
          const y = L.frameY + (L.cellSize + L.cellGap) * visR;
          const bg = new PIXI.Graphics();
          bg.lineStyle(1.5 * gs, 0xC08050, 0.6);
          bg.beginFill(0xFFF8E6, 0.9);
          bg.drawRoundedRect(x, y, L.cellSize, L.cellSize, 8 * gs);
          bg.endFill();
          frame.addChild(bg);
          scene.cellBgs[r][c] = bg;
        }
      }

      // 5. Ring cells (conveyor — top + right column).
      scene.ringCellBgs = {};
      scene.ringTokens = {};
      // 10 collectible cells (pos 1..10) — the actual conveyor where
      // tokens travel and can be intercepted.
      for (let pos = 1; pos <= 10; pos++) {
        const ctr = ringCellCenter(pos);
        if (!ctr) continue;
        const bg = new PIXI.Graphics();
        bg.lineStyle(1.5 * gs, 0x9C7A4A, 0.9);
        bg.beginFill(0xE8D5B0, 0.95);
        bg.drawRoundedRect(
          ctr.x - L.cellSize / 2, ctr.y - L.cellSize / 2,
          L.cellSize, L.cellSize, 8 * gs
        );
        bg.endFill();
        frame.addChild(bg);
        scene.ringCellBgs[pos] = bg;
        scene.ringTokens[pos] = null;
      }

      // Creating tile (pos 0) — LEFT of pos 1. Visually distinct portal
      // shape. Each spin it puffs smoke; sometimes a new token emerges.
      {
        const ctr = ringCellCenter(0);
        const bg = new PIXI.Graphics();
        bg.lineStyle(2 * gs, 0x4FB2A8, 0.95);
        bg.beginFill(0x163E40, 0.95);
        bg.drawRoundedRect(
          ctr.x - L.cellSize / 2, ctr.y - L.cellSize / 2,
          L.cellSize, L.cellSize, 10 * gs
        );
        bg.endFill();
        // Inner spawn-port ring.
        bg.lineStyle(1.5 * gs, 0x6FE0D6, 0.7);
        bg.drawCircle(ctr.x, ctr.y, L.cellSize * 0.30);
        bg.lineStyle(1 * gs, 0x6FE0D6, 0.4);
        bg.drawCircle(ctr.x, ctr.y, L.cellSize * 0.18);
        frame.addChild(bg);
        scene.ringCellBgs[0] = bg;
        // Save the centre point — animator uses it for smoke puffs.
        scene.creatingTileCtr = { x: ctr.x, y: ctr.y };
      }

      // Destroying tile (pos 11) — RIGHT of pos 10. Visually distinct
      // crusher/sink. Tokens that walk off the conveyor slide here and
      // are destroyed with a particle burst.
      {
        const ctr = ringCellCenter(11);
        const bg = new PIXI.Graphics();
        bg.lineStyle(2 * gs, 0xC04848, 0.95);
        bg.beginFill(0x401818, 0.95);
        bg.drawRoundedRect(
          ctr.x - L.cellSize / 2, ctr.y - L.cellSize / 2,
          L.cellSize, L.cellSize, 10 * gs
        );
        bg.endFill();
        // Crossed-X "danger" mark.
        bg.lineStyle(2.5 * gs, 0xE8786C, 0.8);
        const off = L.cellSize * 0.22;
        bg.moveTo(ctr.x - off, ctr.y - off); bg.lineTo(ctr.x + off, ctr.y + off);
        bg.moveTo(ctr.x + off, ctr.y - off); bg.lineTo(ctr.x - off, ctr.y + off);
        frame.addChild(bg);
        scene.ringCellBgs[11] = bg;
        scene.destroyingTileCtr = { x: ctr.x, y: ctr.y };
      }

      const drawDot = (fromPos, toPos) => {
        const a = ringCellCenter(fromPos), b = ringCellCenter(toPos);
        if (!a || !b) return;
        const dot = new PIXI.Graphics();
        dot.beginFill(0x9C7A4A, 0.45);
        dot.drawCircle((a.x + b.x) / 2, (a.y + b.y) / 2, 2.5 * gs);
        dot.endFill();
        frame.addChild(dot);
      };
      // Connectors: 0→1 (entry from creating tile), 1..10 (along conveyor),
      // 10→11 (exit toward destroying tile).
      for (let p = 0; p < 11; p++) drawDot(p, p + 1);

      // 6a. Cell tint layer — gold halo BEHIND symbols (BB pattern).
      const cellTintLayer = new PIXI.Container();
      scene.cellTintLayer = cellTintLayer;
      scene.stage.addChild(cellTintLayer);
      scene.cellTints = [];
      for (let r = 0; r < 5; r++) {
        scene.cellTints[r] = [];
        for (let c = 0; c < 5; c++) scene.cellTints[r][c] = null;
      }

      // 6b. Cell mult-text layer — big "N×" text BEHIND symbols. Per the
      // user's spec: "the grid has the multiplier, not the symbol — symbols
      // drop ON TO the multipliers." So the big text is painted on the
      // grid surface and partially obscured by whatever symbol is on top
      // of it. The small upper-right badge (layer 6e below) carries the
      // legible read-out for the player.
      const cellMultTextLayer = new PIXI.Container();
      scene.cellMultTextLayer = cellMultTextLayer;
      scene.stage.addChild(cellMultTextLayer);
      scene.cellMultTexts = [];
      for (let r = 0; r < 5; r++) {
        scene.cellMultTexts[r] = [];
        for (let c = 0; c < 5; c++) scene.cellMultTexts[r][c] = null;
      }

      // 6c. Slot layer — symbol containers (above the tint + big text).
      const slotLayer = new PIXI.Container();
      scene.slotLayer = slotLayer;
      scene.stage.addChild(slotLayer);
      for (let r = 0; r < 5; r++) {
        scene.cells[r] = []; scene.symbols[r] = []; scene.stamps[r] = [];
        for (let c = 0; c < 5; c++) {
          const cont = new PIXI.Container();
          const ctr = slotCellCenter(r, c);
          cont.x = ctr.x; cont.y = ctr.y;
          slotLayer.addChild(cont);
          scene.cells[r][c] = cont;
          scene.symbols[r][c] = null;
          scene.stamps[r][c] = null;
        }
      }
      if (currentGrid) {
        for (let r = 0; r < 5; r++) {
          for (let c = 0; c < 5; c++) {
            const cell = currentGrid[r][c];
            if (!cell) continue;
            const sym = makeSlotSymbol(cell, L.cellSize);
            scene.cells[r][c].addChild(sym);
            scene.symbols[r][c] = sym;
          }
        }
      }

      // 6d. Tile badge layer — small upper-right pill ON TOP of the symbol
      // showing the multiplier value as a legible read-out (BB pattern).
      const tileBadgeLayer = new PIXI.Container();
      scene.tileBadgeLayer = tileBadgeLayer;
      scene.stage.addChild(tileBadgeLayer);
      scene.tileBadges = [];
      for (let r = 0; r < 5; r++) {
        scene.tileBadges[r] = [];
        for (let c = 0; c < 5; c++) scene.tileBadges[r][c] = null;
      }

      // Mask the slot 5×5 region for all four layers (tint, big text,
      // symbols, badge).
      const slotLeft = L.frameX;
      const slotRight = L.frameX + (L.cellSize + L.cellGap) * 5 - L.cellGap;
      const slotTop = L.frameY + (L.cellSize + L.cellGap) * 1;
      const slotBottom = L.frameY + (L.cellSize + L.cellGap) * 6 - L.cellGap;
      const gridMask = new PIXI.Graphics();
      gridMask.beginFill(0xFFFFFF);
      gridMask.drawRect(slotLeft, slotTop, slotRight - slotLeft, slotBottom - slotTop);
      gridMask.endFill();
      scene.stage.addChild(gridMask);
      slotLayer.mask = gridMask;
      cellTintLayer.mask = gridMask;
      cellMultTextLayer.mask = gridMask;
      tileBadgeLayer.mask = gridMask;
      scene.gridMask = gridMask;

      // 7. Conveyor token layer — sits ABOVE the slot layer (so a token
      // animation overlapping the slot grid renders in front of symbols).
      // Not masked — tokens travel along the L outside the slot bounds.
      const conveyorLayer = new PIXI.Container();
      scene.conveyorLayer = conveyorLayer;
      scene.stage.addChild(conveyorLayer);

      // 8. FX layer on top of everything.
      const fx = new PIXI.Container();
      scene.fxLayer = fx;
      scene.stage.addChild(fx);

      // HUD row anchored relative to the FRAME's bottom (BB pattern), not
      // pinned to the canvas bottom. Layout:
      //   [info]  [balance]  [win]  [− bet +]  [spin]
      const pillW   = 200 * gs;
      const pillH   =  58 * gs;
      const pillGap =  14 * gs;
      const winPillW = pillW * 1.35;
      const adjR    =  22 * gs;
      const btnSize = 130 * gs;
      const infoSize = 60 * gs;

      const fieldW = pillW + pillGap + winPillW + pillGap + adjR + pillW + adjR;
      const fieldLeft = (L.sw - fieldW) / 2;

      const balanceCX = fieldLeft + pillW / 2;
      const winCX     = balanceCX + pillW / 2 + pillGap + winPillW / 2;
      const betCX     = winCX + winPillW / 2 + pillGap + adjR + pillW / 2;
      const minusCX   = betCX - pillW / 2;
      const plusCX    = betCX + pillW / 2;
      const infoCX    = fieldLeft - pillGap - infoSize / 2;
      const spinCX    = (betCX + pillW / 2 + adjR) + pillGap + btnSize / 2;
      // Anchor: a breathing gap below the frame, plus pill height.
      const uiGapBelowFrame = 36 * gs;
      const hudCY = L.frameY + L.frameSize + uiGapBelowFrame + pillH / 2;

      // Balance pill
      scene.balancePill = makePill({
        x: balanceCX, y: hudCY, label: 'BALANCE',
        value: fmtCash(player.balance), width: pillW,
      });
      scene.stage.addChild(scene.balancePill);

      // Win pill (wider — accommodates big wins)
      scene.winPill = makePill({
        x: winCX, y: hudCY, label: 'WIN',
        value: fmtCash(0), width: winPillW, accent: 0x6FD2FF,
      });
      scene.stage.addChild(scene.winPill);

      // Bet pill (interactive — click cycles up; − / + buttons too)
      scene.betPill = makePill({
        x: betCX, y: hudCY, label: 'BET',
        value: fmtCash(player.bet), width: pillW, interactive: true,
        onClick: () => cycleBet(+1),
      });
      scene.stage.addChild(scene.betPill);

      scene.betMinusBtn = makeAdjustButton('−', () => cycleBet(-1));
      scene.betMinusBtn.x = minusCX; scene.betMinusBtn.y = hudCY;
      scene.stage.addChild(scene.betMinusBtn);
      scene.betPlusBtn = makeAdjustButton('+', () => cycleBet(+1));
      scene.betPlusBtn.x = plusCX; scene.betPlusBtn.y = hudCY;
      scene.stage.addChild(scene.betPlusBtn);

      // (BUY FEATURE button intentionally not rendered. The helpers
      // — canBuyFeature / featureCost / featureSpinCount / startFeature
      // / openBuyFeatureModal — are still defined and callable from the
      // console, in case we want to surface this later.)
      scene.buyBtn = null;

      // Info button — opens the paytable modal. Hover/press scaling
      // matches BB's interactive sprite pattern.
      scene.infoBtn = new PIXI.Sprite(infoButtonTexture);
      scene.infoBtn.anchor.set(0.5);
      scene.infoBtn.scale.set(infoSize / infoButtonTexture.height);
      scene.infoBtn.x = infoCX; scene.infoBtn.y = hudCY;
      scene.infoBtn.eventMode = 'static'; scene.infoBtn.cursor = 'pointer';
      const infoBaseScale = scene.infoBtn.scale.x;
      scene.infoBtn.on('pointerover', () => gsap.to(scene.infoBtn.scale, { x: infoBaseScale * 1.08, y: infoBaseScale * 1.08, duration: 0.12 }));
      scene.infoBtn.on('pointerout',  () => gsap.to(scene.infoBtn.scale, { x: infoBaseScale,        y: infoBaseScale,        duration: 0.12 }));
      scene.infoBtn.on('pointerdown', () => gsap.to(scene.infoBtn.scale, { x: infoBaseScale * 0.92, y: infoBaseScale * 0.92, duration: 0.08 }));
      scene.infoBtn.on('pointerup',   () => gsap.to(scene.infoBtn.scale, { x: infoBaseScale * 1.08, y: infoBaseScale * 1.08, duration: 0.10 }));
      scene.infoBtn.on('pointerupoutside', () => gsap.to(scene.infoBtn.scale, { x: infoBaseScale, y: infoBaseScale, duration: 0.10 }));
      scene.infoBtn.on('pointertap',  () => openPaytableModal());
      scene.stage.addChild(scene.infoBtn);

      // Spin button (sprite, rotates while busy)
      const btn = new PIXI.Sprite(spinButtonTexture);
      btn.anchor.set(0.5);
      btn.scale.set(btnSize / spinButtonTexture.height);
      btn.x = spinCX; btn.y = hudCY;
      btn.eventMode = 'static'; btn.cursor = 'pointer';
      const baseScale = btn.scale.x;
      btn.on('pointerover', () => {
        if (btn.busy) return;
        gsap.to(btn.scale, { x: baseScale * 1.06, y: baseScale * 1.06, duration: 0.12 });
      });
      btn.on('pointerout', () => {
        if (btn.busy) return;
        gsap.to(btn.scale, { x: baseScale, y: baseScale, duration: 0.12 });
      });
      btn.on('pointerdown', () => {
        if (btn.busy) return;
        gsap.to(btn.scale, { x: baseScale * 0.94, y: baseScale * 0.94, duration: 0.08 });
      });
      btn.on('pointerup', () => {
        gsap.to(btn.scale, { x: baseScale, y: baseScale, duration: 0.12, ease: 'back.out(2)' });
      });
      btn.on('pointertap', () => onSpinClick());
      btn._setBusy = (b) => {
        btn.busy = b;
        btn.alpha = b ? 0.55 : 1;
        btn.cursor = b ? 'default' : 'pointer';
        if (b) {
          btn._spinTween = gsap.to(btn, {
            rotation: btn.rotation + Math.PI * 2,
            duration: 1.2, ease: 'none', repeat: -1,
          });
        } else {
          if (btn._spinTween) { btn._spinTween.kill(); btn._spinTween = null; }
          gsap.to(btn, { rotation: 0, duration: 0.3, ease: 'power2.out' });
        }
      };
      scene.stage.addChild(btn);
      scene.spinBtn = btn;

      // ── Debug RTP overlay (BB pattern). Low-contrast text near the
      // bottom edge — shows live measured RTP, spin count, hit rate.
      scene.rtpText = new PIXI.Text('RTP 0.00%  |  Spins 0', {
        fontFamily: FONT, fontSize: 13 * gs, fill: 0xFFE0A0,
      });
      scene.rtpText.anchor.set(0.5);
      scene.rtpText.alpha = 0.55;
      scene.rtpText.x = L.sw / 2;
      scene.rtpText.y = L.sh - 18 * gs;
      scene.stage.addChild(scene.rtpText);

      // Per-mode scene widget hook (BB-style). Future modes can register
      // a `buildSceneFeatureWidget` that adds mode-specific UI (e.g. a
      // multiplier ladder, a pot-fill bar) without modifying buildScene.
      window.PlunderPath.getModeDef().buildSceneFeatureWidget?.(scene, app, { L });

      // Sync HUD state (gating, free-spin banner) on first paint AND every
      // rebuild so resize-during-feature still shows the correct controls.
      refreshHUD();
    }

    // Tracks the last balance value DISPLAYED on the pill (not necessarily
    // the live player.balance). Used as the count-up source so subsequent
    // updates animate from the visible value, not the engine value.
    let _displayedBalance = null;
    function refreshHUD(opts) {
      // Balance is animated when changing; instant-set on initial paint /
      // bet cycles to avoid distracting tweens. opts.animateBalance = true
      // lets call sites opt in to the animation (spin payouts).
      if (scene.balancePill && scene.balancePill.valText) {
        if (_displayedBalance == null) _displayedBalance = player.balance;
        if (opts && opts.animateBalance) {
          tweenCount(scene.balancePill.valText, _displayedBalance, player.balance);
        } else {
          scene.balancePill.valText.text = fmtCash(player.balance);
          if (scene.balancePill.valText._countTween) {
            scene.balancePill.valText._countTween.kill();
            scene.balancePill.valText._countTween = null;
          }
        }
        _displayedBalance = player.balance;
      }
      if (scene.betPill)     scene.betPill.valText.text     = fmtCash(player.bet);
      refreshBetControlsEnabled();
      updateSpinButtonState();
      refreshFreeSpinBanner();
      if (scene.buyBtn && scene.buyBtn._refresh) scene.buyBtn._refresh();
      updateRtpText();
    }
    // Live debug overlay — RTP / spin count / avg win pinned to the bottom
    // of the canvas. Low-contrast so it doesn't compete with the HUD pills.
    function updateRtpText() {
      if (!scene.rtpText) return;
      const s = window.PlunderPath.stats;
      const pct = (s.rtp * 100).toFixed(2);
      scene.rtpText.text = `RTP ${pct}%   |   Spins ${s.spins}   |   Hit ${(s.hitRate * 100).toFixed(1)}%   |   Avg win ${s.avgWin.toFixed(2)}`;
    }
    function setWinDisplay(amount) {
      if (!scene.winPill || !scene.winPill.valText) return;
      // Smooth count-up from the currently-displayed value to the target.
      const t = scene.winPill.valText;
      const fromVal = _readWinDisplay();
      tweenCount(t, fromVal, amount);
    }
    function _readWinDisplay() {
      if (!scene.winPill || !scene.winPill.valText) return 0;
      const txt = scene.winPill.valText.text || '$0.00';
      // Strip $ and commas to parse.
      const n = parseFloat(txt.replace(/[$,]/g, ''));
      return isNaN(n) ? 0 : n;
    }

    // ── Spin / bet gating (BB pattern) ───────────────────────────────────────
    function isSpinning() {
      return !!(scene.spinBtn && scene.spinBtn.busy);
    }
    function inFreeSpinFeature() {
      return !!(game && game.state && (game.state.inFreeSpin || game.state.freeSpinsBank > 0));
    }
    function canAffordSpin() {
      if (inFreeSpinFeature()) return true;
      return player.balance >= player.bet;
    }
    function refreshBetControlsEnabled() {
      // Bet controls are disabled while a spin is in flight OR while the
      // free-spin feature is running (locked bet).
      const lock = isSpinning() || inFreeSpinFeature();
      const apply = (obj) => {
        if (!obj) return;
        obj.alpha = lock ? 0.4 : 1;
        obj.eventMode = lock ? 'none' : 'static';
        obj.cursor = lock ? 'default' : 'pointer';
      };
      apply(scene.betPill);
      apply(scene.betMinusBtn);
      apply(scene.betPlusBtn);
    }
    function updateSpinButtonState() {
      const btn = scene.spinBtn;
      if (!btn) return;
      // Spin button only goes "dim/disabled" when the player can't afford.
      // While spinning, _setBusy already handles alpha + rotation, so we
      // don't fight it here.
      if (btn.busy) return;
      const ok = canAffordSpin();
      btn.alpha = ok ? 1 : 0.5;
      btn.cursor = ok ? 'pointer' : 'default';
    }
    // ── Buy-feature (BB pattern) ─────────────────────────────────────────────
    // Cost = bet × 100; awards SCATTER_TRIGGER_SPINS free spins.
    const FEATURE_COST_MULT = 100;
    function featureCost() { return player.bet * FEATURE_COST_MULT; }
    function featureSpinCount() {
      return window.PlunderPath.SCATTER_TRIGGER_SPINS || 10;
    }
    function canBuyFeature() {
      return !inFreeSpinFeature() && player.balance >= featureCost();
    }
    function startFeature() {
      const cost = featureCost();
      const spins = featureSpinCount();
      if (player.balance < cost) return;
      player.balance -= cost;
      game.state.freeSpinsBank += spins;
      refreshHUD({ animateBalance: true });
      // Kick off the first feature spin after the dialog closes.
      setTimeout(() => onSpinClick(), 350);
    }
    function openBuyFeatureModal() {
      if (!canBuyFeature()) return;
      const cost = featureCost();
      const spins = featureSpinCount();
      _openSimpleModal({
        title: 'Buy Feature',
        bodyLines: [
          'Are you sure you want to buy',
          `${spins} free spins for ${fmtCash(cost)}?`,
          ' ',
          'Free spins use your CURRENT bet.',
          'Tokens still spawn and travel along the conveyor.',
        ],
        buttons: [
          { label: 'CANCEL', fill: 0xB22A2A, hoverFill: 0xD43C3C, stroke: 0xFF6B6B,
            onTap: (close) => close() },
          { label: 'YES',    fill: 0x2E7D32, hoverFill: 0x3FA143, stroke: 0x7FE080,
            onTap: (close) => { close(); startFeature(); } },
        ],
      });
    }

    function flashInsufficientBalance() {
      const p = scene.balancePill;
      if (!p) return;
      gsap.killTweensOf(p.scale);
      gsap.fromTo(p.scale,
        { x: 1.08, y: 1.08 },
        { x: 1, y: 1, duration: 0.40, ease: 'back.out(2)' });
      const v = p.valText;
      if (!v) return;
      const orig = v.style.fill;
      v.style.fill = 0xE05A5A;
      setTimeout(() => { v.style.fill = orig; }, 380);
    }
    function refreshFreeSpinBanner() {
      // Tiny indicator next to the title: "FREE SPINS: N" while the
      // feature is active. Removed once the bank empties.
      const left = (game && game.state) ? game.state.freeSpinsBank : 0;
      if (left > 0) {
        if (!scene.freeSpinBanner) {
          const gs = L.gameScale;
          const txt = new PIXI.Text(`FREE SPINS: ${left}`, {
            fontFamily: FONT, fontSize: 18 * gs,
            fill: 0xA8E060, stroke: 0x2A1808, strokeThickness: 4 * gs,
            fontWeight: 'bold', letterSpacing: 1.5,
          });
          txt.anchor.set(0.5, 0);
          txt.x = L.sw / 2;
          txt.y = (scene.titleTxt ? scene.titleTxt.y + scene.titleTxt.height + 4 * gs : 60 * gs);
          scene.stage.addChild(txt);
          scene.freeSpinBanner = txt;
        } else {
          scene.freeSpinBanner.text = `FREE SPINS: ${left}`;
        }
      } else if (scene.freeSpinBanner) {
        scene.freeSpinBanner.parent && scene.freeSpinBanner.parent.removeChild(scene.freeSpinBanner);
        scene.freeSpinBanner.destroy();
        scene.freeSpinBanner = null;
      }
    }

    // ── Animator ─────────────────────────────────────────────────────────────
    class SpinAnimator {
      constructor() { this.runningWin = 0; this.playing = false; }
      _addToRunningWin(amount) {
        this.runningWin += amount;
        setWinDisplay(this.runningWin);
        if (scene.winPill) {
          gsap.killTweensOf(scene.winPill.scale);
          gsap.fromTo(scene.winPill.scale,
            { x: 1.06, y: 1.06 },
            { x: 1, y: 1, duration: 0.30, ease: 'back.out(2)' });
        }
        // Big-bet pulse: any single contribution reaching the bet threshold
        // gets the elastic pop on the win value.
        if (amount >= player.bet) pulseWinPill();
      }
      async _wait(ms) { return new Promise(res => setTimeout(res, ms)); }

      // Kill any in-flight tweens on a sprite (and its scale/position)
      // before destroying it — a lingering tween writing to a destroyed
      // PIXI transform throws every frame.
      _killSpriteTweens(s) {
        if (!s) return;
        gsap.killTweensOf(s);
        if (s.scale) gsap.killTweensOf(s.scale);
        if (s.position) gsap.killTweensOf(s.position);
      }
      _setSlotSymbol(r, c, cell) {
        const old = scene.symbols[r][c];
        if (old) {
          this._killSpriteTweens(old);
          scene.cells[r][c].removeChild(old);
          old.destroy({ children: true });
        }
        if (!cell) { scene.symbols[r][c] = null; return null; }
        const sym = makeSlotSymbol(cell, L.cellSize);
        scene.cells[r][c].addChild(sym);
        scene.symbols[r][c] = sym;
        return sym;
      }
      // Set or update a cell's multiplier stamp. BB Bloom-Tiles pattern:
      // gold halo on cellTintLayer (behind the symbol) + big "N×" text on
      // cellMultTextLayer (above). value <= 1 clears the stamp.
      // Stamps are POSITIONAL — they live on cell coordinates, never travel
      // with falling symbols (per the user's "stays for the duration of
      // the spin" spec).
      _setStamp(r, c, value) {
        const ctr = slotCellCenter(r, c);
        // ── Tint
        const oldTint = scene.cellTints[r][c];
        if (oldTint) {
          gsap.killTweensOf(oldTint);
          if (oldTint.parent) oldTint.parent.removeChild(oldTint);
          oldTint.destroy();
          scene.cellTints[r][c] = null;
        }
        // ── Big text
        const oldText = scene.cellMultTexts[r][c];
        if (oldText) {
          gsap.killTweensOf(oldText);
          gsap.killTweensOf(oldText.scale);
          if (oldText.parent) oldText.parent.removeChild(oldText);
          oldText.destroy();
          scene.cellMultTexts[r][c] = null;
        }
        // ── Upper-right badge
        const oldBadge = scene.tileBadges && scene.tileBadges[r][c];
        if (oldBadge) {
          gsap.killTweensOf(oldBadge);
          gsap.killTweensOf(oldBadge.scale);
          if (oldBadge.parent) oldBadge.parent.removeChild(oldBadge);
          oldBadge.destroy({ children: true });
          scene.tileBadges[r][c] = null;
        }
        scene.stamps[r][c] = null;

        if (!value || value <= 1) return null;

        // Tint behind symbol.
        const tint = makeCellTint(value, L.cellSize, ctr.x, ctr.y);
        scene.cellTintLayer.addChild(tint);
        scene.cellTints[r][c] = tint;
        gsap.to(tint, { alpha: tint._targetAlpha, duration: 0.24, ease: 'sine.out' });

        // Big "N×" text painted on the GRID, BEHIND the symbol — partially
        // hidden by whatever symbol is on top. The badge below is the
        // legible read-out.
        const text = makeCellMultText(value, L.cellSize, ctr.x, ctr.y);
        scene.cellMultTextLayer.addChild(text);
        scene.cellMultTexts[r][c] = text;
        gsap.to(text,       { alpha: 0.85, duration: 0.22, ease: 'power2.out' });
        gsap.to(text.scale, { x: 1, y: 1, duration: 0.36, ease: 'back.out(2)' });

        // Small upper-right pill badge ON TOP of the symbol — the player's
        // legible read-out. The cell-top corner uses slot-grid screen coords.
        const cellLeft = ctr.x - L.cellSize / 2;
        const cellTop  = ctr.y - L.cellSize / 2;
        const badge = makeTileBadge(value, L.cellSize, cellLeft, cellTop);
        scene.tileBadgeLayer.addChild(badge);
        scene.tileBadges[r][c] = badge;
        badge.alpha = 0;
        badge.scale.set(0.6);
        gsap.to(badge,       { alpha: 1, duration: 0.20, ease: 'power2.out' });
        gsap.to(badge.scale, { x: 1, y: 1, duration: 0.34, ease: 'back.out(2)' });

        scene.stamps[r][c] = text;   // back-compat for _animateMultiplierTraversal
        return text;
      }

      _clearAllStamps() {
        for (let r = 0; r < 5; r++) {
          for (let c = 0; c < 5; c++) {
            const tint = scene.cellTints && scene.cellTints[r][c];
            if (tint) {
              gsap.killTweensOf(tint);
              if (tint.parent) tint.parent.removeChild(tint);
              tint.destroy();
              scene.cellTints[r][c] = null;
            }
            const text = scene.cellMultTexts && scene.cellMultTexts[r][c];
            if (text) {
              gsap.killTweensOf(text);
              gsap.killTweensOf(text.scale);
              if (text.parent) text.parent.removeChild(text);
              text.destroy();
              scene.cellMultTexts[r][c] = null;
            }
            const badge = scene.tileBadges && scene.tileBadges[r][c];
            if (badge) {
              gsap.killTweensOf(badge);
              gsap.killTweensOf(badge.scale);
              if (badge.parent) badge.parent.removeChild(badge);
              badge.destroy({ children: true });
              scene.tileBadges[r][c] = null;
            }
            if (scene.stamps && scene.stamps[r]) scene.stamps[r][c] = null;
          }
        }
      }
      // Hard-snap restore — used only on full scene rebuild (resize).
      // For spin-to-spin animation we never destroy + recreate tokens;
      // we add/move/remove them based on engine events.
      _restoreConveyor(tokens) {
        for (let pos = 1; pos <= 10; pos++) {
          const old = scene.ringTokens[pos];
          if (old) {
            this._killSpriteTweens(old);
            if (old.parent) old.parent.removeChild(old);
            old.destroy({ children: true });
          }
          scene.ringTokens[pos] = null;
        }
        for (const t of tokens) {
          if (t.pos >= 1 && t.pos <= 10) {
            const sprite = makeTokenSprite(t, L.cellSize);
            const ctr = ringCellCenter(t.pos);
            sprite.x = ctr.x; sprite.y = ctr.y;
            scene.conveyorLayer.addChild(sprite);
            scene.ringTokens[t.pos] = sprite;
          }
        }
      }

      // A freshly-spawned token slides IN from off-grid pos 0 (one cell
      // left of pos 1) into pos 1. Engine flags it spawnedThisSpin so the
      // shift step keeps it at pos 1 for one full spin (intercept window).
      async _animateTokenSpawn(token, slideDuration = 0.36) {
        const sprite = makeTokenSprite(token, L.cellSize);
        const start  = ringCellCenter(0);
        const target = ringCellCenter(token.pos);
        sprite.x = start.x; sprite.y = start.y;
        sprite.alpha = 0; sprite.scale.set(0.85);
        scene.conveyorLayer.addChild(sprite);
        scene.ringTokens[token.pos] = sprite;
        return new Promise(res => {
          gsap.timeline({ onComplete: res })
            .to(sprite,       { alpha: 1, duration: 0.18, ease: 'power2.out' }, 0)
            .to(sprite.scale, { x: 1, y: 1, duration: 0.30, ease: 'back.out(2)' }, 0)
            .to(sprite,       { x: target.x, y: target.y, duration: slideDuration, ease: 'power2.inOut' }, 0);
        });
      }

      // Surviving tokens slide forward by 1 cell. Tokens reaching pos 11
      // slide there and fade out. Pass `skipPositions` (a Set of pre-shift
      // ring positions) for tokens that won't shift this spin (they're
      // about to be intercepted during cascades and should stay put).
      async _animateConveyorShift(skipPositions = new Set(), duration = 0.32) {
        const tweens = [];
        // Iterate from FAR end to NEAR end so we don't overwrite scene.ringTokens
        // entries while we're still reading them.
        for (let pos = 10; pos >= 1; pos--) {
          if (skipPositions.has(pos)) continue;
          const sprite = scene.ringTokens[pos];
          if (!sprite) continue;
          const newPos = pos + 1;
          if (newPos >= 11) {
            const target = ringCellCenter(11);
            // Fade-out runs in the last ~0.20s of the slide so the destroy
            // beat times with the slide's end regardless of total duration.
            const fadeDur = Math.min(0.20, duration * 0.4);
            tweens.push(new Promise(res => {
              gsap.timeline({
                onComplete: () => {
                  if (scene.destroyingTileCtr) {
                    spawnDestroyEffect(
                      scene.fxLayer,
                      scene.destroyingTileCtr.x, scene.destroyingTileCtr.y,
                    );
                  }
                  sprite.destroy({ children: true });
                  res();
                },
              })
                .to(sprite, { x: target.x, y: target.y, duration, ease: 'power2.inOut' })
                .to(sprite, { alpha: 0, duration: fadeDur, ease: 'power2.in' }, duration - fadeDur + 0.05);
            }));
            scene.ringTokens[pos] = null;
          } else {
            const target = ringCellCenter(newPos);
            tweens.push(new Promise(res => {
              gsap.to(sprite, {
                x: target.x, y: target.y,
                duration, ease: 'power2.inOut',
                onComplete: res,
              });
            }));
            scene.ringTokens[pos] = null;
            scene.ringTokens[newPos] = sprite;
          }
        }
        await Promise.all(tweens);
      }

      // Real "spin": drop the existing grid out (downward fall), then
      // drop the new grid in from above with a stagger per column.
      async _spinDropOut() {
        const tweens = [];
        const dropDist = L.cellSize * 7;
        for (let r = 0; r < 5; r++) {
          for (let c = 0; c < 5; c++) {
            const sym = scene.symbols[r][c];
            if (!sym) continue;
            tweens.push(new Promise(res => {
              gsap.to(sym, {
                y: sym.y + dropDist,
                duration: 0.25 + (4 - r) * 0.02,
                ease: 'power2.in',
                delay: c * 0.02,
                onComplete: () => {
                  sym.parent.removeChild(sym);
                  sym.destroy({ children: true });
                  scene.symbols[r][c] = null;
                  res();
                },
              });
            }));
            // Drop stamps (tint + big text) along with their symbol.
            const tint = scene.cellTints && scene.cellTints[r][c];
            if (tint) {
              gsap.to(tint, {
                y: tint.y + dropDist,
                duration: 0.25, ease: 'power2.in',
                onComplete: () => {
                  if (tint.parent) tint.parent.removeChild(tint);
                  tint.destroy();
                  scene.cellTints[r][c] = null;
                },
              });
            }
            const txt = scene.cellMultTexts && scene.cellMultTexts[r][c];
            if (txt) {
              gsap.to(txt, {
                y: txt.y + dropDist,
                duration: 0.25, ease: 'power2.in',
                onComplete: () => {
                  if (txt.parent) txt.parent.removeChild(txt);
                  txt.destroy();
                  scene.cellMultTexts[r][c] = null;
                  if (scene.stamps && scene.stamps[r]) scene.stamps[r][c] = null;
                },
              });
            }
            const badge = scene.tileBadges && scene.tileBadges[r][c];
            if (badge) {
              gsap.to(badge, {
                y: badge.y + dropDist,
                duration: 0.25, ease: 'power2.in',
                onComplete: () => {
                  if (badge.parent) badge.parent.removeChild(badge);
                  badge.destroy({ children: true });
                  scene.tileBadges[r][c] = null;
                },
              });
            }
          }
        }
        await Promise.all(tweens);
      }

      async _spinDropIn(grid) {
        const tweens = [];
        for (let r = 0; r < 5; r++) {
          for (let c = 0; c < 5; c++) {
            const cell = grid[r][c];
            if (!cell) continue;
            const sym = makeSlotSymbol(cell, L.cellSize);
            scene.cells[r][c].addChild(sym);
            scene.symbols[r][c] = sym;
            const dropDist = L.cellSize * (r + 2) + 40;
            sym.y = -dropDist;
            tweens.push(new Promise(res => {
              gsap.to(sym, {
                y: 0,
                duration: 0.30 + r * 0.04,
                ease: 'back.out(1.4)',
                delay: c * 0.04,
                onComplete: res,
              });
            }));
          }
        }
        await Promise.all(tweens);
      }

      _spawnPayText(x, y, amount, big = false) {
        const t = new PIXI.Text(`+${fmtCash(amount)}`, {
          fontFamily: FONT,
          fontSize: (big ? 38 : 26) * L.gameScale,
          fill: big ? 0xFFD54F : 0x6FA8C2,
          stroke: 0x2A1808, strokeThickness: 5 * L.gameScale,
          fontWeight: 'bold',
        });
        t.anchor.set(0.5); t.x = x; t.y = y; t.alpha = 0;
        t.scale.set(0.5);
        scene.fxLayer.addChild(t);
        gsap.timeline({ onComplete: () => t.destroy() })
          .to(t,       { alpha: 1, duration: 0.18, ease: 'power2.out' }, 0)
          .to(t.scale, { x: 1, y: 1, duration: 0.32, ease: 'back.out(2.4)' }, 0)
          .to(t,       { y: y - 70 * L.gameScale, duration: 1.10, ease: 'power2.out' }, 0.18)
          .to(t,       { alpha: 0, duration: 0.30, ease: 'power2.in' }, 1.05);
      }

      async _playClusters(ev) {
        const halos = [];
        for (const cl of ev.clusters) {
          for (const xy of cl.cells) {
            const sym = scene.symbols[xy.r][xy.c];
            if (!sym) continue;
            // Gold outline around every paying cluster cell.
            const halo = new PIXI.Graphics();
            halo.lineStyle(4 * L.gameScale, 0xFFD54F, 1);
            halo.beginFill(0xFFD54F, 0.18);
            halo.drawRoundedRect(
              -L.cellSize * 0.46, -L.cellSize * 0.46,
              L.cellSize * 0.92, L.cellSize * 0.92, 8 * L.gameScale
            );
            halo.endFill();
            halo.alpha = 0;
            scene.cells[xy.r][xy.c].addChildAt(halo, 0);
            halos.push(halo);
            gsap.timeline()
              .to(halo,      { alpha: 1, duration: 0.18, ease: 'power2.out' })
              .to(sym.scale, { x: 1.10, y: 1.10, duration: 0.20, ease: 'back.out(2)' }, 0);
          }
        }
        await this._wait(420);
        for (const cl of ev.clusters) {
          let cx = 0, cy = 0;
          for (const xy of cl.cells) {
            const p = slotCellCenter(xy.r, xy.c);
            cx += p.x; cy += p.y;
          }
          cx /= cl.cells.length; cy /= cl.cells.length;
          const amount = cl.pay * player.bet;
          this._spawnPayText(cx, cy, amount, amount >= 5 * player.bet);
          this._addToRunningWin(amount);
        }
        await this._wait(280);
        const popPromises = [];
        for (const cl of ev.clusters) {
          for (const xy of cl.cells) {
            const sym = scene.symbols[xy.r][xy.c];
            if (!sym) continue;
            // Wild cells PERSIST — don't pop them visually (engine keeps
            // them on the grid and refills around them).
            if (sym.symbolWild) continue;
            popPromises.push(new Promise(res => {
              gsap.timeline({ onComplete: res })
                .to(sym.scale, { x: 1.4, y: 1.4, duration: 0.16, ease: 'back.out(2)' })
                .to(sym,       { alpha: 0,        duration: 0.22, ease: 'power2.in' }, '<0.04')
                .to(sym.scale, { x: 0.2, y: 0.2, duration: 0.22, ease: 'power2.in' }, '<');
            }));
          }
        }
        await Promise.all(popPromises);
        for (const halo of halos) {
          if (halo.parent) halo.parent.removeChild(halo);
          halo.destroy();
        }
        for (const cl of ev.clusters) {
          for (const xy of cl.cells) {
            const sym = scene.symbols[xy.r][xy.c];
            if (sym && sym.symbolWild) continue;
            this._setSlotSymbol(xy.r, xy.c, null);
          }
        }
      }

      // Per-token activation feedback. Each fired type gets its own beat:
      //   wild       — silent flash, no payout text (the wild line is the
      //                payout, applied to the grid).
      //   multiplier — character travels through the source cluster + any
      //                connected clusters (sharing H/V border), planting a
      //                stamp at every cell visited.
      //   freespins  — green burst + "+3 FREE SPINS" banner.
      //   jackpot    — big tier label + cash payout text.
      async _animateIntercepts(intercepts, clusterEvent) {
        if (!intercepts || intercepts.length === 0) return;
        // Per spec: wild activations finish FIRST, then everything else
        // (multiplier traversals, jackpot bursts, freespin banners) so
        // the player sees the grid go wild before the multiplier walks
        // its now-wild cluster. Within each phase, activations still run
        // in parallel.
        const phaseRun = async (filter) => {
          const promises = [];
          for (const ic of intercepts) {
            const fired = ic.fired || {};
            if (!filter(fired)) continue;
            const sprite = scene.ringTokens[ic.ringPos];
            if (!sprite) continue;
            scene.ringTokens[ic.ringPos] = null;
            const ringCtr = ringCellCenter(ic.ringPos);
            promises.push(this._activateToken(sprite, ringCtr, fired, clusterEvent));
          }
          await Promise.all(promises);
        };
        await phaseRun(f => f.type === 'wild');
        await phaseRun(f => f.type !== 'wild');
      }

      async _activateToken(sprite, ctr, fired, clusterEvent) {
        const gs = L.gameScale;
        // Gold outline ring around the token chip itself, drawn at the
        // token's screen position. Pulses out and fades — matches the
        // gold outline on activated cluster cells.
        const ringR = L.cellSize * 0.40;
        const goldRing = new PIXI.Graphics();
        goldRing.lineStyle(4 * gs, 0xFFD54F, 1);
        goldRing.drawCircle(0, 0, ringR);
        goldRing.x = ctr.x; goldRing.y = ctr.y;
        goldRing.alpha = 0;
        scene.fxLayer.addChild(goldRing);
        gsap.timeline()
          .to(goldRing,       { alpha: 1, duration: 0.16, ease: 'power2.out' }, 0)
          .to(goldRing.scale, { x: 1.35, y: 1.35, duration: 0.50, ease: 'power2.out' }, 0)
          .to(goldRing,       { alpha: 0, duration: 0.30, ease: 'power2.in' }, 0.30)
          .call(() => goldRing.destroy());

        // Common: scale-pop on the token before its type-specific reaction.
        const popPromise = new Promise(res => {
          gsap.timeline({ onComplete: res })
            .to(sprite.scale, { x: 1.55, y: 1.55, duration: 0.18, ease: 'back.out(2.6)' })
            .to(sprite.scale, { x: 1.10, y: 1.10, duration: 0.10, ease: 'sine.inOut' });
        });

        // Type-specific FX runs concurrent with the pop.
        const fxPromise = this._tokenActivationFx(ctr, fired, clusterEvent);

        await Promise.all([popPromise, fxPromise]);

        // Common outro: the token itself fades and shrinks away.
        await new Promise(res => {
          gsap.timeline({ onComplete: () => { sprite.destroy({ children: true }); res(); } })
            .to(sprite,       { alpha: 0, duration: 0.22, ease: 'power2.in' }, 0)
            .to(sprite.scale, { x: 0.3, y: 0.3, duration: 0.26, ease: 'power2.in' }, 0);
        });
      }

      _tokenActivationFx(ctr, fired, clusterEvent) {
        const gs = L.gameScale;
        const type = fired.type;

        // Outer ring pulse (used by multiplier + freespins + jackpot).
        const ringPulse = (color) => {
          const ring = new PIXI.Graphics();
          ring.lineStyle(4 * gs, color, 1);
          ring.drawCircle(0, 0, L.cellSize * 0.40);
          ring.x = ctr.x; ring.y = ctr.y; ring.alpha = 0.9;
          scene.fxLayer.addChild(ring);
          return new Promise(res => {
            gsap.timeline({ onComplete: () => { ring.destroy(); res(); } })
              .to(ring.scale, { x: 2.4, y: 2.4, duration: 0.55, ease: 'power2.out' }, 0)
              .to(ring,       { alpha: 0,        duration: 0.55, ease: 'power2.out' }, 0);
          });
        };

        if (type === 'wild') {
          // Character walks the row/column the token reaches, planting
          // WILD on each cell along the way. Engine has already promoted
          // those cells to wild internally; the animator's job is to make
          // the conversion visible cell-by-cell.
          return this._animateWildTraversal(ctr, fired);
        }

        if (type === 'multiplier') {
          // Traversal: chip flies from the ring position into the source
          // cluster, then walks cell-to-cell through that cluster + any
          // cluster connected to it via H/V edge (per spec). At each
          // cell visited it plants a stamp with the per-cluster summed
          // multiplier value (engine pre-computed clusterMult, exposed
          // on each cluster as `appliedMult`).
          return this._animateMultiplierTraversal(ctr, fired, clusterEvent);
        }

        if (type === 'freespins') {
          const amt = fired.amount || 3;
          this._showFeatureBanner(`+${amt} FREE SPINS`, 0xA8E060);
          return ringPulse(0xA8E060);
        }

        if (type === 'jackpot') {
          const tier = fired.tier || 'tiny';
          const tierTxt = tier.toUpperCase();
          const tierColors = { tiny: 0xC8AA88, mini: 0xD4A04A, major: 0xC04848, grand: 0xA88AC0 };
          const color = tierColors[tier] || 0xFFD54F;
          // Tier nameplate floats up, then the cash payout flies up.
          const label = new PIXI.Text(tierTxt, {
            fontFamily: FONT, fontSize: 44 * gs,
            fill: color, stroke: 0x2A1808, strokeThickness: 6 * gs,
            fontWeight: 'bold',
          });
          label.anchor.set(0.5);
          label.x = ctr.x; label.y = ctr.y;
          label.alpha = 0; label.scale.set(0.4);
          scene.fxLayer.addChild(label);
          const labelFly = new Promise(res => {
            gsap.timeline({ onComplete: () => { label.destroy(); res(); } })
              .to(label,       { alpha: 1, duration: 0.18, ease: 'power2.out' }, 0)
              .to(label.scale, { x: 1, y: 1, duration: 0.36, ease: 'back.out(2.4)' }, 0)
              .to(label,       { y: ctr.y - 70 * gs, duration: 1.10, ease: 'power2.out' }, 0.18)
              .to(label,       { alpha: 0, duration: 0.30, ease: 'power2.in' }, 1.10);
          });
          const amount = (fired.payBet || 0) * player.bet;
          this._spawnPayText(ctr.x, ctr.y + 30 * gs, amount, true);
          this._addToRunningWin(amount);
          // Sparkle stream from token → win pill so the player sees the
          // money fly to the HUD. Bigger tiers get more particles + shake.
          const winPill = scene.winPill;
          if (winPill) {
            const tierCount = { tiny: 14, mini: 18, major: 26, grand: 34 };
            spawnSparkleStream(
              scene.fxLayer, ctr.x, ctr.y, winPill.x, winPill.y,
              tierCount[tier] || 18
            );
          }
          // Tier-scaled screen shake. Grand is loud; tiny is a tiny nudge.
          const tierShake = { tiny: 4, mini: 6, major: 10, grand: 14 };
          shakeStage((tierShake[tier] || 6) * gs, 0.50);
          return Promise.all([ringPulse(color), labelFly]);
        }

        // Fallback — no FX
        return Promise.resolve();
      }

      // Multiplier traversal — the character chip flies from the ring
      // position into the source cluster cell, then walks BFS through
      // every cell in its connected component (source cluster + any
      // cluster sharing an H/V border with it). At each cell visited it
      // plants a stamp showing the per-cluster summed multiplier value.
      // No connected clusters → traversal stays inside the source cluster.
      async _animateMultiplierTraversal(ringCtr, fired, clusterEvent) {
        const gs = L.gameScale;
        const value = fired.value || 1;
        const sourceCell = fired.sourceCell;
        if (!sourceCell || !clusterEvent || !clusterEvent.clusters) {
          // Defensive fallback: no cluster context → just a quick pop at
          // the ring position so we don't drop the whole intercept beat.
          return this._wait(120);
        }
        // Find the source cluster + all clusters in its connected component.
        const findClusterIdx = (r, c) =>
          clusterEvent.clusters.findIndex(cl =>
            cl.cells.some(xy => xy.r === r && xy.c === c));
        const srcIdx = findClusterIdx(sourceCell.r, sourceCell.c);
        if (srcIdx < 0) return this._wait(120);
        const srcComp = clusterEvent.clusters[srcIdx].componentId;

        // Build a cell → cluster map for the component.
        const cellKey = (r, c) => `${r},${c}`;
        const inComp = new Set();
        const cellToClusterIdx = new Map();
        for (let i = 0; i < clusterEvent.clusters.length; i++) {
          const cl = clusterEvent.clusters[i];
          if (cl.componentId !== srcComp) continue;
          for (const xy of cl.cells) {
            const k = cellKey(xy.r, xy.c);
            inComp.add(k);
            cellToClusterIdx.set(k, i);
          }
        }
        // Build a 4-adjacent walking path through the component using DFS
        // with backtracking. BFS produced a visit ORDER but the chip would
        // jump between non-adjacent cells (visually reads as a diagonal or
        // teleport). DFS keeps each hop on a 4-neighbour, walking back
        // through visited cells when a branch dead-ends. Path entries
        // carry `fresh` — true on first visit (plant a stamp), false when
        // passing through during back-up (no re-stamp).
        const path = [];
        const visited = new Set();
        const dfs = (cur) => {
          visited.add(cellKey(cur.r, cur.c));
          path.push({ r: cur.r, c: cur.c, fresh: true });
          // Order neighbours so the chip prefers continuing in the
          // direction it just came from (smoother visual). Default to
          // down/right first, then up/left.
          const neighbours = [
            { r: cur.r + 1, c: cur.c },
            { r: cur.r, c: cur.c + 1 },
            { r: cur.r - 1, c: cur.c },
            { r: cur.r, c: cur.c - 1 },
          ];
          for (const n of neighbours) {
            const k = cellKey(n.r, n.c);
            if (inComp.has(k) && !visited.has(k)) {
              dfs(n);
              // After returning, we're walking back over `cur`. Add it
              // again as a passing-through step IF more cells still need
              // visiting (avoids a trailing duplicate at path end).
              if (visited.size < inComp.size) {
                path.push({ r: cur.r, c: cur.c, fresh: false });
              }
            }
          }
        };
        dfs({ r: sourceCell.r, c: sourceCell.c });

        // Build the traveling chip: small circle + the multiplier value.
        const r = L.cellSize * 0.22;
        const chip = new PIXI.Container();
        const body = new PIXI.Graphics();
        body.lineStyle(2 * gs, 0x2A1808, 1);
        body.beginFill(0xFFD54F, 1);
        body.drawCircle(0, 0, r);
        body.endFill();
        // (No shine highlight — flat fill, matches conveyor tokens.)
        chip.addChild(body);
        const txt = new PIXI.Text(`${value}×`, {
          fontFamily: FONT, fontSize: r * 0.95,
          fill: 0x2A1808, fontWeight: 'bold',
        });
        txt.anchor.set(0.5);
        chip.addChild(txt);
        chip.x = ringCtr.x; chip.y = ringCtr.y;
        chip.alpha = 0; chip.scale.set(0.6);
        scene.fxLayer.addChild(chip);

        // Fade in at the ring, then begin the walk.
        await new Promise(res => {
          gsap.timeline({ onComplete: res })
            .to(chip,       { alpha: 1, duration: 0.18, ease: 'power2.out' }, 0)
            .to(chip.scale, { x: 1, y: 1, duration: 0.24, ease: 'back.out(2.2)' }, 0);
        });

        // Hop cell-to-cell, planting a stamp on FRESH visits and just
        // passing through on back-tracking visits. Cadence: walk → slam
        // (on fresh) → short pause → next. Walk-through during back-up
        // is faster (no slam, no pause).
        const HOP_DURATION    = 0.20;   // travel time to next cell
        const SLAM_DURATION   = 0.12;   // chip squashes down on arrival
        const PAUSE_AFTER     = 50;     // ms held after a fresh stamp
        const WALKBACK_DURATION = 0.13; // shorter hop for back-tracking
        for (let i = 0; i < path.length; i++) {
          const cell = path[i];
          const target = slotCellCenter(cell.r, cell.c);
          const dur = cell.fresh ? HOP_DURATION : WALKBACK_DURATION;
          await new Promise(res => {
            gsap.to(chip, {
              x: target.x, y: target.y,
              duration: dur, ease: 'power2.inOut',
              onComplete: res,
            });
          });
          if (!cell.fresh) continue;   // passing through, don't re-stamp
          const clIdx = cellToClusterIdx.get(cellKey(cell.r, cell.c));
          const stampValue = clusterEvent.clusters[clIdx]?.appliedMult || value;
          this._setStamp(cell.r, cell.c, stampValue);
          await new Promise(res => {
            gsap.timeline({ onComplete: res })
              .to(chip.scale, { x: 1.30, y: 0.75, duration: SLAM_DURATION, ease: 'power2.out' }, 0)
              .to(chip.scale, { x: 1.00, y: 1.00, duration: SLAM_DURATION, ease: 'back.out(2.4)' }, SLAM_DURATION);
          });
          await this._wait(PAUSE_AFTER);
        }
        // Done — the chip fades out at the last cell.
        await new Promise(res => {
          gsap.timeline({ onComplete: () => { chip.destroy({ children: true }); res(); } })
            .to(chip,       { alpha: 0, duration: 0.22, ease: 'power2.in' }, 0)
            .to(chip.scale, { x: 0.5, y: 0.5, duration: 0.22, ease: 'power2.in' }, 0);
        });
      }

      // Wild traversal — chip walks down a column (top-edge token) or
      // left across a row (right-edge token), planting WILD on every cell
      // it passes. Engine has already flagged those cells as wild for
      // the rest of the spin; the animator just sells the moment.
      async _animateWildTraversal(ringCtr, fired) {
        const gs = L.gameScale;
        const pos = fired.pos;
        // Build the path of cells the character walks.
        const path = [];
        if (pos >= 1 && pos <= 5) {
          // Top-edge token → walks DOWN column (pos-1).
          const c = pos - 1;
          for (let r = 0; r < GAME.ROWS; r++) path.push({ r, c });
        } else if (pos >= 6 && pos <= 10) {
          // Right-edge token → walks LEFT across row (pos-6).
          const r = pos - 6;
          for (let c = GAME.COLS - 1; c >= 0; c--) path.push({ r, c });
        } else {
          return this._wait(120);
        }

        // Build the chip — same shape as multiplier chip but gold + 'W'.
        const r = L.cellSize * 0.22;
        const chip = new PIXI.Container();
        const body = new PIXI.Graphics();
        body.lineStyle(2 * gs, 0x2A1808, 1);
        body.beginFill(0xFFD54F, 1);
        body.drawCircle(0, 0, r);
        body.endFill();
        chip.addChild(body);
        const txt = new PIXI.Text('W', {
          fontFamily: FONT, fontSize: r * 1.10,
          fill: 0x2A1808, fontWeight: 'bold',
        });
        txt.anchor.set(0.5);
        chip.addChild(txt);
        chip.x = ringCtr.x; chip.y = ringCtr.y;
        chip.alpha = 0; chip.scale.set(0.6);
        scene.fxLayer.addChild(chip);

        await new Promise(res => {
          gsap.timeline({ onComplete: res })
            .to(chip,       { alpha: 1, duration: 0.18, ease: 'power2.out' }, 0)
            .to(chip.scale, { x: 1, y: 1, duration: 0.24, ease: 'back.out(2.2)' }, 0);
        });

        // Per spec: only the engine's CHOSEN cells (2 or 3 random ones
        // from the row/column) become wild. The chip still walks the
        // whole row/column for the visual; on chosen cells it stomps and
        // converts; on the rest it just passes through (no slam, faster).
        const chosenSet = new Set(
          (fired.chosenCells || []).map(xy => `${xy.r},${xy.c}`)
        );
        const HOP_DURATION    = 0.20;   // hop onto a chosen cell
        const PASS_DURATION   = 0.13;   // hop past an unchosen cell
        const SLAM_DURATION   = 0.12;
        const PAUSE_AFTER     = 50;
        for (let i = 0; i < path.length; i++) {
          const cell = path[i];
          const isChosen = chosenSet.has(`${cell.r},${cell.c}`);
          const target = slotCellCenter(cell.r, cell.c);
          await new Promise(res => {
            gsap.to(chip, {
              x: target.x, y: target.y,
              duration: isChosen ? HOP_DURATION : PASS_DURATION,
              ease: 'power2.inOut',
              onComplete: res,
            });
          });
          if (!isChosen) continue;   // walk through, don't convert
          const old = scene.symbols[cell.r][cell.c];
          if (old && !old.symbolWild) {
            const color = old.symbolColor;
            this._setSlotSymbol(cell.r, cell.c, { color, wild: true });
            const sym = scene.symbols[cell.r][cell.c];
            if (sym) {
              gsap.fromTo(sym.scale,
                { x: 0.6, y: 0.6 },
                { x: 1, y: 1, duration: 0.28, ease: 'back.out(2.4)' });
            }
          }
          await new Promise(res => {
            gsap.timeline({ onComplete: res })
              .to(chip.scale, { x: 1.30, y: 0.75, duration: SLAM_DURATION, ease: 'power2.out' }, 0)
              .to(chip.scale, { x: 1.00, y: 1.00, duration: SLAM_DURATION, ease: 'back.out(2.4)' }, SLAM_DURATION);
          });
          await this._wait(PAUSE_AFTER);
        }
        // Chip fades out at the last cell.
        await new Promise(res => {
          gsap.timeline({ onComplete: () => { chip.destroy({ children: true }); res(); } })
            .to(chip,       { alpha: 0, duration: 0.22, ease: 'power2.in' }, 0)
            .to(chip.scale, { x: 0.5, y: 0.5, duration: 0.22, ease: 'power2.in' }, 0);
        });
      }

      _showFeatureBanner(text, accentHex) {
        const gs = L.gameScale;
        const banner = new PIXI.Container();
        const bg = new PIXI.Graphics();
        const padX = 28 * gs, padY = 14 * gs;
        const tt = new PIXI.Text(text, {
          fontFamily: FONT, fontSize: 32 * gs,
          fill: 0xFFECB3, stroke: 0x2A1808, strokeThickness: 5 * gs,
          fontWeight: 'bold', letterSpacing: 1.5,
        });
        tt.anchor.set(0.5);
        const w = tt.width + padX * 2;
        const h = tt.height + padY * 2;
        bg.lineStyle(3 * gs, accentHex, 1);
        bg.beginFill(0x2A1808, 0.92);
        bg.drawRoundedRect(-w / 2, -h / 2, w, h, h * 0.34);
        bg.endFill();
        banner.addChild(bg);
        banner.addChild(tt);
        banner.x = L.sw / 2;
        banner.y = L.frameY + L.frameSize / 2;
        banner.alpha = 0;
        banner.scale.set(0.7);
        scene.fxLayer.addChild(banner);
        gsap.timeline({ onComplete: () => banner.destroy({ children: true }) })
          .to(banner,       { alpha: 1, duration: 0.20, ease: 'power2.out' }, 0)
          .to(banner.scale, { x: 1, y: 1, duration: 0.36, ease: 'back.out(2.2)' }, 0)
          .to(banner,       { y: banner.y - 30 * gs, duration: 0.90, ease: 'sine.out' }, 0.20)
          .to(banner,       { alpha: 0, duration: 0.40, ease: 'power2.in' }, 1.00);
      }

      _applyStickyWilds(stickyWilds) {
        for (const sw of stickyWilds || []) {
          const old = scene.symbols[sw.r][sw.c];
          if (old) {
            const c = old.symbolColor;
            this._setSlotSymbol(sw.r, sw.c, { color: c, wild: true });
          }
        }
      }

      async _playRefill(ev) {
        this._applyStickyWilds(ev.stickyWilds);
        const moveTweens = [];
        for (const m of ev.moves) {
          const sym = scene.symbols[m.from.r][m.from.c];
          if (!sym) continue;
          // Symbols MOVE with gravity. Stamps DON'T — they're positional
          // (per spec: stay on the grid for the duration of the spin).
          // A new symbol falling into a stamped cell visually inherits
          // the existing stamp at that position.
          scene.symbols[m.from.r][m.from.c] = null;
          scene.symbols[m.to.r][m.to.c]     = sym;
          const oldGlobal = sym.parent.toGlobal(new PIXI.Point(sym.x, sym.y));
          scene.cells[m.to.r][m.to.c].addChild(sym);
          const newLocal = scene.cells[m.to.r][m.to.c].toLocal(oldGlobal);
          sym.x = newLocal.x; sym.y = newLocal.y;
          moveTweens.push(new Promise(res => {
            gsap.to(sym, { x: 0, y: 0, duration: 0.25, ease: 'power2.in', onComplete: res });
          }));
        }
        await Promise.all(moveTweens);
        const spawnTweens = [];
        for (const s of ev.spawns) {
          const sym = makeSlotSymbol(s.cell, L.cellSize);
          scene.cells[s.r][s.c].addChild(sym);
          scene.symbols[s.r][s.c] = sym;
          const dropDist = L.cellSize * (s.r + 1) + 20;
          sym.y = -dropDist; sym.alpha = 0.85;
          spawnTweens.push(new Promise(res => {
            gsap.timeline({ onComplete: res })
              .to(sym, { y: 0, duration: 0.30, ease: 'power2.in' })
              .to(sym, { alpha: 1, duration: 0.10, ease: 'sine.out' }, 0);
          }));
        }
        await Promise.all(spawnTweens);
      }

      async play(spinResult, beforeTokens) {
        this.playing = true;
        try {
          await this._playInner(spinResult, beforeTokens);
        } finally {
          this.playing = false;
          // If a resize fired DURING the spin, rebuild() deferred itself.
          // Now that the animator is idle, run the catch-up rebuild so the
          // layout reflects the new viewport.
          if (typeof _runPendingRebuild === 'function') _runPendingRebuild();
        }
      }

      async _playInner(spinResult, beforeTokens) {
        this.runningWin = 0;
        setWinDisplay(0);

        // 0. Creating tile puffs smoke at the start of every spin —
        //    whether or not a new token actually spawns this spin (per
        //    spec: "puffing out a symbol or not"). When a token IS
        //    spawning this spin, the puff is a touch denser.
        if (scene.creatingTileCtr) {
          const newSpawnIncoming =
            spinResult.events.find(e => e.type === 'conveyorSnapshot')?.tokens?.some(t => t.spawnedThisSpin) ||
            (beforeTokens && spinResult.events.find(e => e.type === 'conveyorSnapshot')?.tokens?.length > beforeTokens.length);
          spawnSmokePuff(
            scene.fxLayer,
            scene.creatingTileCtr.x, scene.creatingTileCtr.y,
            newSpawnIncoming ? 1.4 : 0.9,
          );
        }

        // 0b. Wipe any stamps left behind by the previous spin. Stamps are
        //     supposed to clear at spin end; this is a belt-and-suspenders
        //     fix for races where a stamp tween outlives its spin.
        this._clearAllStamps();

        // Token motion (shift + new-spawn slide-in) STARTS NOW — concurrent
        // with drop-out + drop-in — and is sized to last the full
        // click-to-symbols-settled span (~1s) so all token movement lands
        // when the last symbol lands. Engine now shifts at the START of
        // runSpin and intercepts using POST-shift positions, so the
        // visual shift advances every token (no skip set needed) and
        // the cascade animation finds each token at its intercept slot.
        const SHIFT_DURATION = 1.0;
        const tokenMotionPromises = [
          this._animateConveyorShift(new Set(), SHIFT_DURATION),
        ];
        // Engine tags the new-spawn token explicitly on the snapshot —
        // diffing pre/post positions broke after the shift-first reorder
        // because every existing token also has a new pos.
        const snapEv = spinResult.events.find(e => e.type === 'conveyorSnapshot');
        const newSpawn = snapEv?.tokenSpawned || null;
        if (newSpawn && !scene.ringTokens[newSpawn.pos]) {
          tokenMotionPromises.push(this._animateTokenSpawn(newSpawn, SHIFT_DURATION));
        }

        // 1. Drop existing slot grid out (token motion runs in parallel).
        await this._spinDropOut();

        // 2. Drop new grid in (still in parallel with token motion).
        const concurrent = [...tokenMotionPromises];
        const spawnEv = spinResult.events.find(e => e.type === 'spawn');
        if (spawnEv) concurrent.push(this._spinDropIn(spawnEv.grid));
        await Promise.all(concurrent);

        // 3. Cascades — intercepts use engine's ringPos directly because
        //    intercepted tokens haven't shifted (we skipped them above).
        for (const ev of spinResult.events) {
          if (ev.type === 'clusters') {
            const ics = spinResult.intercepts.filter(i => i.cascade === ev.cascadeIndex);
            // Pass the cluster event into intercept FX so the multiplier
            // traversal can read componentId / appliedMult per cluster.
            await this._animateIntercepts(ics, ev);
            await this._playClusters(ev);
            await this._wait(220);
          } else if (ev.type === 'refill') {
            await this._playRefill(ev);
            await this._wait(150);
          }
        }
      }

    }

    const animator = new SpinAnimator();

    // Persisted grid (BB pattern). buildScene() reads this back on every
    // rebuild so resize/orientation changes don't blank the slot.
    let currentGrid = null;

    const game = {
      state: { conveyor: [], freeSpinsBank: 0, inFreeSpin: false },
    };

    // Tracks whether the previous spin landed in a state that should
    // auto-chain into the next spin (free-spin feature). Set in the
    // animator-finished branch and consumed after the busy flag is cleared
    // so popups (retrigger / congrats) can pause the chain naturally.
    let _chainNextSpin = false;

    async function onSpinClick() {
      // Bug guard: must check the spin button's own busy flag (set by
      // _setBusy), not a stale player flag — _setBusy doesn't write
      // player.busy. Without this, mashing spin queues spins.
      if (!scene.spinBtn || scene.spinBtn.busy) return;
      let wasInFreeSpin = false;
      if (game.state.freeSpinsBank > 0) {
        game.state.inFreeSpin = true;
        game.state.freeSpinsBank -= 1;
        wasInFreeSpin = true;
      } else {
        if (!canAffordSpin()) {
          flashInsufficientBalance();
          return;
        }
        // Bet is animated DOWN on the balance pill so the deduction reads.
        player.balance -= player.bet;
        game.state.inFreeSpin = false;
        refreshHUD({ animateBalance: true });
      }
      scene.spinBtn._setBusy(true);
      refreshHUD();   // disable bet controls + dim spin while busy

      let chainNext = false;
      try {
        // Snapshot conveyor BEFORE engine mutates it — animator uses
        // this to detect a newly-spawned token vs. existing ones.
        const beforeTokens = game.state.conveyor.map(t => ({ ...t }));
        const result = window.PlunderPath.runSpin(player.bet, game.state);
        await animator.play(result, beforeTokens);
        currentGrid = result.finalGrid;   // persist for resize repaint
        const win = result.finalWin;
        if (win > 0) {
          player.balance += win;
          // Big-win celebration: shake + win-pill pulse for hits ≥ 10× bet.
          if (win >= 10 * player.bet) {
            shakeStage(8 * (L.gameScale || 1), 0.45);
            pulseWinPill();
          }
        }
        // Free-spin announcement — fires AFTER cluster animations land.
        // Combines awards from token activation (`freeSpinsAwarded`) and
        // scatter trigger / retrigger into a single popup. "Retrigger" if
        // we were already in the feature when this spin started; "Free
        // Spins!" if this spin enters the feature fresh.
        const tokenAwarded   = result.freeSpinsAwarded || 0;
        const scatterAwarded = (result.scatterTriggered ? window.PlunderPath.SCATTER_TRIGGER_SPINS : 0)
                             + (result.scatterRetriggerSpins || 0);
        const totalAwarded = tokenAwarded + scatterAwarded;
        if (totalAwarded > 0) {
          openFreeSpinAnnounceModal(totalAwarded, wasInFreeSpin);
        }
        // Auto-chain into the next free spin (BB pattern). Defer the actual
        // call until AFTER busy is cleared and any popup queue settles, so
        // a Congratulations / retrigger modal naturally pauses the chain.
        if (game.state.freeSpinsBank > 0) chainNext = true;
      } catch (e) {
        console.error('spin failed:', e);
      } finally {
        scene.spinBtn._setBusy(false);
        // Animate the win credit onto the balance pill.
        refreshHUD({ animateBalance: true });
      }

      _chainNextSpin = chainNext;
      if (_chainNextSpin) {
        // Wait briefly for any popup to mount before checking the gate.
        setTimeout(() => {
          if (!_chainNextSpin) return;
          if (_openSimpleModalCount > 0) return; // popup blocks chain
          _chainNextSpin = false;
          onSpinClick();
        }, 500);
      }
    }

    // ── Boot ─────────────────────────────────────────────────────────────────
    {
      // Generate the initial grid ONCE; buildScene reads from currentGrid
      // every time so symbols don't disappear on resize.
      currentGrid = window.PlunderPath.generateGrid();
    }
    buildScene();

    // Debounced resize — collapse a flurry of resize events into one
    // rebuild (BB pattern). Deferred during in-flight spins: tearing down
    // sprites the animator is still tweening produces ghost references
    // and visual glitches. The animator's finally block calls
    // `_runPendingRebuild()` to catch up once the spin lands.
    let resizeTimer = null;
    let _pendingRebuild = false;
    const _doRebuild = () => {
      if (animator && animator.playing) { _pendingRebuild = true; return; }
      _invalidateLayout();
      buildScene();
      animator._restoreConveyor(game.state.conveyor);
    };
    function _runPendingRebuild() {
      if (!_pendingRebuild) return;
      _pendingRebuild = false;
      _invalidateLayout();
      buildScene();
      animator._restoreConveyor(game.state.conveyor);
    }
    const _onResize = () => {
      if (resizeTimer) clearTimeout(resizeTimer);
      resizeTimer = setTimeout(_doRebuild, 120);
    };
    window.addEventListener('resize', _onResize);
    window.addEventListener('orientationchange', () => {
      _onResize();
      setTimeout(_onResize, 350);
    });

    // Spacebar = spin (also closes paytable on Esc). Any open modal —
    // paytable OR a simple-modal popup (buy feature, congrats, etc.) —
    // blocks the spin so space can't fire while a dialog is up.
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        if (scene.paytableModal) return;          // paytable blocks spin
        if (_openSimpleModalCount > 0) return;    // any popup blocks spin
        onSpinClick();
      }
    });
  </script>
</body>
</html>
