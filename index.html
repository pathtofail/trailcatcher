<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0E1A24" />
  <title>Trail Catcher</title>
  <style>
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background: #7A6D57; color: #FFD54F; overflow: hidden;
      font-family: 'Fredoka One', sans-serif;
    }
    .boot-msg {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    #boot-msg {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      letter-spacing: 4px; font-size: 13px; opacity: 0.6;
      text-transform: uppercase;
    }
    #pixi-canvas { display: block; width: 100vw; height: 100vh; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
</head>
<body>
  <div id="boot-msg">Loading…</div>

  <script type="module">
    // ═══════════════════════════════════════════════════════════════════════════
    // TRAIL CATCHER — ENGINE
    // ═══════════════════════════════════════════════════════════════════════════
    // 7×7 cluster-pays slot with an L-shaped conveyor of tokens walking
    // past the top + right edges of the grid.
    //
    // Conveyor layout: COLS+ROWS collectible positions + 1 finish.
    // Tokens "jump" the corner — there's no dead cell with no grid
    // connection, so the last top-edge slot goes directly to the first
    // right-edge slot.
    //
    // Per spin, the engine:
    //   1. Rolls token spawn at position 1 (weighted type).
    //   2. Shifts every surviving token forward by 1 (toward exit).
    //   3. Spins the slot grid (cluster pays, cascading refills).
    //   4. Resolves edge-aligned wins → activates any token sitting on
    //      the matching ring cell.
    //
    // The activation rule, edge-reach, and multiplier-line behaviour are
    // documented inline below.
    // ═══════════════════════════════════════════════════════════════════════════

    // ── RNG (swappable, deterministic for sim) ───────────────────────────────
    let _rng = Math.random;
    function setRng(fn) { _rng = fn; }
    function makeSeededRng(seed) {
      let a = (seed >>> 0) || 1;
      return function () {
        a |= 0; a = (a + 0x6D2B79F5) | 0;
        let t = Math.imul(a ^ (a >>> 15), 1 | a);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    // ── Slot symbol palette ──────────────────────────────────────────────────
    // 8 symbols, low → high pay. basePay values come from a reference
    // cluster slot's pay table (we'll tune the rest around these). The pay
    // formula is the simplest possible:
    //
    //     cluster_pay = basePay × cluster_size
    //
    // i.e. linear in cluster size — a 5-cluster of Symbol 1 (basePay 0.05)
    // pays 0.25× bet; a 25-cluster (whole grid) of Symbol 8 (1.50) pays
    // 37.5× bet baseline. Conveyor multipliers and cell stamps stack on top.
    // 8 hues spread ~45° apart on the wheel, all high-saturation, similar
    // lightness so no symbol fades against the cream cell bg. Names kept;
    // rename later if the new colors clash too hard with the words.
    const COLORS = [
      { name: 'Coin',    hex: '#FFD23F', basePay: 0.05, weight: 22 },   // bright yellow
      { name: 'Rope',    hex: '#FF8C42', basePay: 0.08, weight: 18 },   // vivid orange
      { name: 'Cloth',   hex: '#3897F0', basePay: 0.10, weight: 15 },   // sky blue
      { name: 'Bottle',  hex: '#2FD3B5', basePay: 0.15, weight: 12 },   // mint teal
      { name: 'Powder',  hex: '#6FCF3D', basePay: 0.50, weight: 10 },   // lime green
      { name: 'Map',     hex: '#E63946', basePay: 0.60, weight:  8 },   // vivid red
      { name: 'Dagger',  hex: '#8E4FE3', basePay: 0.75, weight:  5 },   // grape purple
      { name: 'Skull',   hex: '#E84A8A', basePay: 1.50, weight:  3 },   // hot pink
    ];
    const COLOR_BY_NAME = Object.fromEntries(COLORS.map(c => [c.name, c]));

    const GAME = {
      ROWS: 7,
      COLS: 7,
      MIN_CLUSTER: 5,
      MAX_CASCADES: 30,
    };

    // ── Conveyor / token system ──────────────────────────────────────────────
    // L-shaped conveyor: GAME.COLS top-edge cells + GAME.ROWS right-edge
    // cells = RING_SIZE collectible positions. FINISH_POS is one past the
    // last (the destroying tile, off-grid).
    //
    // Mapping ring position → which slot row/col (if any) it sits over:
    //   pos 1..COLS              → above column (pos - 1)
    //   pos COLS+1..COLS+ROWS    → right of row (pos - COLS - 1)
    const RING_SIZE = GAME.ROWS + GAME.COLS;
    const FINISH_POS = RING_SIZE + 1;

    const TOKEN_SPAWN_CHANCE = 0.35;
    const TOKEN_TYPE_WEIGHTS = [
      { type: 'multiplier', weight: 44 },
      { type: 'wild',       weight: 15 },
      { type: 'freespins',  weight: 10.5 },
      { type: 'tiny',       weight: 23 },
      { type: 'mini',       weight:  5 },
      { type: 'major',      weight:  2.4 },
      { type: 'grand',      weight:  0.1 },   // ultra rare — Grand-tier carry too much RTP at higher weights
    ];
    const TOKEN_TYPE_WEIGHT_TOTAL =
      TOKEN_TYPE_WEIGHTS.reduce((s, t) => s + t.weight, 0);

    // Multiplier face values rolled per multiplier-token spawn.
    const MULTIPLIER_VALUES = [
      { value: 2,   weight: 50 },
      { value: 3,   weight: 25 },
      { value: 5,   weight: 14 },
      { value: 10,  weight:  6 },
      { value: 25,  weight:  3 },
      { value: 100, weight:  1.5 },
      { value: 500, weight:  0.5 },
    ];
    const MULTIPLIER_VALUE_WEIGHT_TOTAL =
      MULTIPLIER_VALUES.reduce((s, m) => s + m.weight, 0);

    const JACKPOT_PAYS = { tiny: 5, mini: 15, major: 100, grand: 200 };
    const FREESPIN_AWARD = 3;

    // ── Scatter symbol (BB-style) ────────────────────────────────────────────
    // Special symbol that pays anywhere on count and triggers free spins
    // separately from the conveyor freespins token. Does NOT participate in
    // clusters (its colour is a sentinel that no flood-fill matches), DOES
    // fall under gravity. Capped at SCATTER_MAX_ON_GRID at any time.
    // Scatter spawn disabled for now (set to 0). Engine code, payouts,
    // trigger logic, and visual rendering are all intact — bumping this
    // back to 0.04 re-enables the symbol without further changes.
    const SCATTER_SPAWN_CHANCE = 0;
    const SCATTER_MAX_ON_GRID  = 6;
    const SCATTER_PAYOUTS      = { 4: 3, 5: 5, 6: 100 }; // × bet
    const SCATTER_TRIGGER_COUNT   = 4;
    const SCATTER_RETRIGGER_COUNT = 3;
    const SCATTER_TRIGGER_SPINS   = 10;
    const SCATTER_RETRIGGER_SPINS = 5;

    // ── Helpers ──────────────────────────────────────────────────────────────
    function pickWeighted(items, totalWeight, weightKey = 'weight') {
      let r = _rng() * totalWeight;
      for (const item of items) {
        r -= item[weightKey];
        if (r <= 0) return item;
      }
      return items[items.length - 1];
    }
    function weightedColor() {
      let total = 0;
      for (const c of COLORS) total += c.weight;
      let r = _rng() * total;
      for (const c of COLORS) {
        r -= c.weight;
        if (r <= 0) return c.name;
      }
      return COLORS[COLORS.length - 1].name;
    }
    function spawnSymbol() { return { color: weightedColor(), wild: false }; }
    function spawnScatterCell() {
      return { color: '__scatter__', scatter: true, wild: false };
    }
    // Live count of scatters currently visible on the grid. Engine mutates
    // this on every spawn / cluster removal / refill so the SCATTER_MAX_ON_GRID
    // cap can be honoured without scanning the grid each cell-spawn.
    let _scattersOnGrid = 0;
    function spawnAnyCell() {
      // Roll for a scatter symbol; gated by the on-grid cap.
      if (_scattersOnGrid < SCATTER_MAX_ON_GRID && _rng() < SCATTER_SPAWN_CHANCE) {
        _scattersOnGrid++;
        return spawnScatterCell();
      }
      return spawnSymbol();
    }
    function countScattersIn(grid) {
      let n = 0;
      for (let r = 0; r < GAME.ROWS; r++) {
        for (let c = 0; c < GAME.COLS; c++) if (grid[r][c] && grid[r][c].scatter) n++;
      }
      return n;
    }
    function generateGrid() {
      _scattersOnGrid = 0;
      const g = [];
      for (let r = 0; r < GAME.ROWS; r++) {
        const row = [];
        for (let c = 0; c < GAME.COLS; c++) row.push(spawnAnyCell());
        g.push(row);
      }
      return g;
    }
    function cloneCell(cell) { return cell ? { ...cell } : null; }
    function cloneGrid(g) { return g.map(row => row.map(cloneCell)); }
    function inBounds(r, c) {
      return r >= 0 && r < GAME.ROWS && c >= 0 && c < GAME.COLS;
    }
    const NEIGHBOURS_4 = [[-1, 0], [1, 0], [0, -1], [0, 1]];

    // ── Cluster detection (4-connected, wilds match any colour) ──────────────
    function findClusters(grid) {
      // `seen` blocks COLOURED cells from being re-claimed across floods —
      // each coloured cell belongs to exactly one cluster. Wild cells are
      // NEVER added to `seen`, so they can be claimed by every flood that
      // touches them (per spec: a wild row sandwiched between brown / red
      // / yellow / teal lets ALL four clusters use those wilds).
      // `localSeen` is per-flood — it stops a single flood from looping
      // back on a wild it already walked through.
      const seen = Array.from({ length: GAME.ROWS }, () => new Array(GAME.COLS).fill(false));
      const out = [];
      for (let r = 0; r < GAME.ROWS; r++) {
        for (let c = 0; c < GAME.COLS; c++) {
          if (seen[r][c]) continue;
          const cell = grid[r][c];
          if (!cell || cell.wild) continue;   // wilds aren't cluster anchors
          if (cell.scatter) { seen[r][c] = true; continue; }
          const target = cell.color;
          const stack = [[r, c]];
          const cells = [];
          seen[r][c] = true;
          const localSeen = new Set();
          localSeen.add(`${r},${c}`);
          while (stack.length) {
            const [cr, cc] = stack.pop();
            cells.push({ r: cr, c: cc });
            for (const [dr, dc] of NEIGHBOURS_4) {
              const nr = cr + dr, nc = cc + dc;
              if (!inBounds(nr, nc)) continue;
              const lkey = `${nr},${nc}`;
              if (localSeen.has(lkey)) continue;
              const n = grid[nr][nc];
              if (!n || n.scatter) continue;
              if (n.wild) {
                // Wilds are claimable by every flood — only `localSeen`
                // gates them, never the global `seen` array.
                localSeen.add(lkey);
                stack.push([nr, nc]);
              } else if (n.color === target && !seen[nr][nc]) {
                seen[nr][nc] = true;
                localSeen.add(lkey);
                stack.push([nr, nc]);
              }
            }
          }
          if (cells.length >= GAME.MIN_CLUSTER) {
            out.push({ color: target, cells });
          }
        }
      }
      return out;
    }

    // ── Refill (gravity + spawn from top) ────────────────────────────────────
    function refill(grid) {
      const moves = [], spawns = [];
      // Wild cells are OBSTACLES — they don't fall, and other cells don't
      // pass through them. The column refills in segments split at each
      // wild row. Each segment runs the standard "drop existing cells to
      // the bottom of the segment, spawn new cells at the segment's top".
      const fillSegment = (c, segTop, segBottom) => {
        if (segTop > segBottom) return;
        let writeR = segBottom;
        for (let r = segBottom; r >= segTop; r--) {
          const cell = grid[r][c];
          if (!cell) continue;
          if (writeR !== r) {
            grid[writeR][c] = cell;
            grid[r][c] = null;
            moves.push({ from: { r, c }, to: { r: writeR, c } });
          }
          writeR--;
        }
        for (let r = writeR; r >= segTop; r--) {
          grid[r][c] = spawnAnyCell();
          spawns.push({ r, c, cell: { ...grid[r][c] } });
        }
      };

      for (let c = 0; c < GAME.COLS; c++) {
        // Find wild row boundaries in this column.
        const wildRows = [];
        for (let r = 0; r < GAME.ROWS; r++) {
          const cell = grid[r][c];
          if (cell && cell.wild) wildRows.push(r);
        }
        if (wildRows.length === 0) {
          fillSegment(c, 0, GAME.ROWS - 1);
          continue;
        }
        // Process segments between wilds, going bottom-to-top.
        let segBottom = GAME.ROWS - 1;
        for (let i = wildRows.length - 1; i >= 0; i--) {
          const wildR = wildRows[i];
          fillSegment(c, wildR + 1, segBottom);
          segBottom = wildR - 1;
        }
        // Top segment (above all wilds).
        fillSegment(c, 0, segBottom);
      }
      return { moves, spawns };
    }

    // ── Conveyor spawn / shift ───────────────────────────────────────────────
    function maybeSpawnToken(conveyor, bet = 1) {
      if (_rng() >= TOKEN_SPAWN_CHANCE) return null;
      // Position 1 must be empty for a fresh token to enter (otherwise the
      // existing token would be displaced or stacked, neither of which we
      // want). After the spin's leading shift, pos 1 is normally empty
      // (whatever was there last spin advanced to pos 2).
      if (conveyor.some(t => t.pos === 1)) return null;
      const typePick = pickWeighted(TOKEN_TYPE_WEIGHTS, TOKEN_TYPE_WEIGHT_TOTAL);
      // spawnBet locks the bet at the moment the token enters the
      // conveyor. Jackpot tokens pay JACKPOT_PAYS[tier] × spawnBet on
      // interception, NOT × current bet — so the player can't grow the
      // bet just because they saw a grand walking the conveyor.
      const token = { type: typePick.type, pos: 1, spawnBet: bet };
      if (token.type === 'multiplier') {
        token.multValue = pickWeighted(MULTIPLIER_VALUES, MULTIPLIER_VALUE_WEIGHT_TOTAL).value;
      }
      conveyor.push(token);
      return token;
    }
    function shiftConveyor(conveyor) {
      const survived = [];
      const dropped = [];
      for (const t of conveyor) {
        const nextPos = t.pos + 1;
        if (nextPos >= FINISH_POS) dropped.push(t);
        else { t.pos = nextPos; survived.push(t); }
      }
      conveyor.length = 0;
      conveyor.push(...survived);
      return dropped;
    }

    // ── Edge-reach: which ring cell does a slot (r,c) project to? ──────────
    // Strict alignment — each edge cell reaches exactly one ring slot
    // (the one directly adjacent to it). The top-right corner cell is
    // the only cell that reaches two ring slots (one on each edge).
    //   Top edge   (r == 0):           ring pos (c + 1)            → 1..COLS
    //   Right edge (c == COLS-1):      ring pos (COLS + 1 + r)     → COLS+1..COLS+ROWS
    //   Corner (r=0, c=COLS-1): both COLS and COLS+1.
    function ringCellsForSlot(r, c) {
      const out = [];
      if (r === 0)             out.push(c + 1);
      if (c === GAME.COLS - 1) out.push(GAME.COLS + 1 + r);
      return out;
    }

    // ── Token activation ─────────────────────────────────────────────────────
    // sourceCellRC is the (r,c) of the cluster cell that intercepted this
    // token. Multiplier-tokens use it to decide the connected-component
    // scope of the multiplier (per spec: applies to source cluster + any
    // cluster connected to it via a shared H/V border).
    function activateToken(token, ctx, sourceCellRC, sourceClusterCells) {
      switch (token.type) {
        case 'multiplier':
          ctx.appliedMults.push({ value: token.multValue, sourceCell: sourceCellRC });
          return { type: 'multiplier', value: token.multValue, sourceCell: sourceCellRC };
        case 'wild': {
          // Wild scatter — 4 OR 5 random cells anywhere on the grid
          // become wild (uniform 50/50 on count, no duplicates). The
          // wilds NEVER land on the triggering cluster's cells (since
          // that cluster is about to pop and would consume them
          // instantly without value).
          const excluded = new Set(
            (sourceClusterCells || []).map(xy => `${xy.r},${xy.c}`)
          );
          const allCells = [];
          for (let rr = 0; rr < GAME.ROWS; rr++) {
            for (let cc = 0; cc < GAME.COLS; cc++) {
              if (excluded.has(`${rr},${cc}`)) continue;
              allCells.push({ r: rr, c: cc });
            }
          }
          const count = Math.min(allCells.length, 4 + (_rng() < 0.5 ? 0 : 1));
          // Fisher–Yates partial shuffle.
          for (let i = 0; i < count && i < allCells.length; i++) {
            const j = i + Math.floor(_rng() * (allCells.length - i));
            [allCells[i], allCells[j]] = [allCells[j], allCells[i]];
          }
          const chosenCells = allCells.slice(0, count);
          ctx.queuedWildLines.push({ pos: token.pos, chosenCells });
          return { type: 'wild', pos: token.pos, chosenCells };
        }
        case 'freespins':
          ctx.freeSpinsAwarded += FREESPIN_AWARD;
          return { type: 'freespins', amount: FREESPIN_AWARD };
        case 'tiny':
        case 'mini':
        case 'major':
        case 'grand': {
          const payBet = JACKPOT_PAYS[token.type];           // bet-multiplier
          const spawnBet = token.spawnBet ?? 1;              // locked at spawn
          const payAmount = payBet * spawnBet;               // actual currency
          ctx.jackpotPay += payAmount;
          return {
            type: 'jackpot', tier: token.type,
            payBet, spawnBet, payAmount,
          };
        }
      }
      return null;
    }

    // ── Spin loop ────────────────────────────────────────────────────────────
    // `state` carries persistent conveyor + free-spin queue across spins.
    function runSpin(bet = 1, state = { conveyor: [], freeSpinsBank: 0, inFreeSpin: false }) {
      const events = [];

      // 1a. Conveyor shift FIRST — last spin's tokens advance one slot,
      //     dropping any that walk off the conveyor (pos 11 = destroying
      //     tile). The visual shift in the animator runs concurrent with
      //     drop-out + drop-in, so by the time the cascade plays the
      //     player sees tokens at exactly the positions used here.
      const mode = getModeDef();
      const dropped = mode.shiftConveyor(state.conveyor);

      // 1b. Token spawn — at pos 1 (now vacant after the shift). Skipped
      //     during free spins (those burn through existing conveyor state).
      let tokenSpawned = null;
      if (!state.inFreeSpin) {
        tokenSpawned = mode.maybeSpawnToken(state.conveyor, bet);
      }
      events.push({
        type: 'conveyorSnapshot',
        tokens: state.conveyor.map(t => ({ ...t })),
        // Explicit "this is the new spawn" hint so the animator doesn't
        // have to diff before/after positions to identify it.
        tokenSpawned: tokenSpawned ? { ...tokenSpawned } : null,
      });

      // 2. Spin grid + cascade.
      let grid = generateGrid();
      events.push({ type: 'spawn', grid: cloneGrid(grid) });

      const ctx = {
        appliedMults:    [],
        queuedWildLines: [],
        freeSpinsAwarded: 0,
        jackpotPay:       0,    // accumulated jackpot win in actual currency
                                // (each jackpot's locked spawnBet × pay tier)
        intercepts: [],
      };

      // Sticky cell-multiplier overlay (Bloom-Tiles style stamps).
      const cellMult = Array.from({ length: GAME.ROWS },
        () => new Array(GAME.COLS).fill(0));

      // Wild persistence rule: a wild cell stays on the grid until either
      // (a) it's part of a paying cluster — then it pops with the cluster,
      // or (b) the spin ends. We don't need a separate "permanent wilds"
      // set: refill's segment logic treats wilds as obstacles, so any
      // wild that wasn't in a popped cluster stays put naturally.
      const currentWildPositions = () => {
        const out = [];
        for (let r = 0; r < GAME.ROWS; r++) {
          for (let c = 0; c < GAME.COLS; c++) {
            if (grid[r][c] && grid[r][c].wild) out.push({ r, c });
          }
        }
        return out;
      };

      let totalPayout = 0;

      for (let cas = 0; cas < GAME.MAX_CASCADES; cas++) {
        // 1. Initial cluster detection — for token interception only.
        //    Tokens project off cluster edge cells, so we need clusters
        //    BEFORE wilds are applied.
        let initialClusters = findClusters(grid);
        if (initialClusters.length === 0) break;

        // 2. Token interception — edge-aligned cluster cells project to
        //    ring positions; if a token sits there, intercept + activate.
        const intercepted = [];
        for (const cl of initialClusters) {
          for (const xy of cl.cells) {
            const ringPositions = mode.ringCellsForSlot(xy.r, xy.c);
            for (const ringPos of ringPositions) {
              const token = state.conveyor.find(t => t.pos === ringPos);
              if (!token || intercepted.includes(token)) continue;
              intercepted.push(token);
              const fired = mode.activateToken(token, ctx, { r: xy.r, c: xy.c }, cl.cells);
              ctx.intercepts.push({
                cascade: cas, ringPos,
                token: { ...token }, fired,
                clusterCellRC: { r: xy.r, c: xy.c },
              });
            }
          }
        }
        for (const t of intercepted) {
          const i = state.conveyor.indexOf(t);
          if (i >= 0) state.conveyor.splice(i, 1);
        }

        // 3. Apply queued wild lines to the grid (mark cells as wild).
        if (ctx.queuedWildLines.length > 0) {
          for (const line of ctx.queuedWildLines) {
            for (const xy of line.chosenCells) {
              if (grid[xy.r][xy.c]) grid[xy.r][xy.c].wild = true;
            }
          }
          ctx.queuedWildLines.length = 0;
        }

        // 4. ITERATIVE cluster processing.
        //    Wilds are claimable by every cluster on EACH detection pass,
        //    but each wild is consumed when the cluster that claims it
        //    pops. Re-detect after every pop so the next cluster only
        //    sees the remaining wilds. Phantom clusters that only met
        //    MIN_CLUSTER via shared wilds may not survive re-detection
        //    once the wilds they relied on are gone. (How most cluster-
        //    pays slots actually treat wilds: each wild cell pays once.)
        //
        //    Order: highest-paying cluster first. We compute each
        //    detected cluster's pay (basePay × cells, with applicable
        //    multiplier from unclaimed multipliers + max stamp) and pop
        //    the biggest first. Tie-break by cells.length desc, then by
        //    first cell coords for determinism.

        // Multipliers waiting to be claimed by their source cluster.
        // After we've processed the cluster containing a multiplier's
        // source cell, the multiplier is consumed. Multipliers whose
        // source cluster doesn't survive re-detection are dropped.
        const unclaimedMults = ctx.appliedMults.slice();
        ctx.appliedMults.length = 0;

        // Compute appliedMult + per-cell pay for a candidate cluster
        // WITHOUT consuming multipliers. Pure read.
        const evaluateCluster = (cl) => {
          let appliedMult = 0;
          for (const m of unclaimedMults) {
            if (!m.sourceCell) continue;
            const inside = cl.cells.some(xy =>
              xy.r === m.sourceCell.r && xy.c === m.sourceCell.c);
            if (inside) appliedMult += m.value;
          }
          if (appliedMult === 0) appliedMult = 1;
          const basePay = COLOR_BY_NAME[cl.color].basePay;
          let perCellSum = 0;
          for (const xy of cl.cells) {
            const cellOnGrid = grid[xy.r][xy.c];
            let effective;
            if (cellOnGrid && cellOnGrid.wild) {
              effective = 1;
            } else {
              const oldStamp = cellMult[xy.r][xy.c] || 0;
              const newMult  = appliedMult > 1 ? appliedMult : 0;
              const m = Math.max(oldStamp, newMult);
              effective = m > 0 ? m : 1;
            }
            perCellSum += basePay * effective;
          }
          return { pay: perCellSum, appliedMult };
        };

        const cascadePaidClusters = [];
        let cascadePay = 0;

        for (let iter = 0; iter < 200; iter++) {
          const detected = findClusters(grid);
          if (detected.length === 0) break;

          // Evaluate each cluster, pick the one paying the most.
          for (const cl of detected) {
            const ev = evaluateCluster(cl);
            cl._pay = ev.pay;
            cl._appliedMult = ev.appliedMult;
          }
          detected.sort((a, b) => {
            if (b._pay !== a._pay) return b._pay - a._pay;
            if (b.cells.length !== a.cells.length) return b.cells.length - a.cells.length;
            // Deterministic tiebreaker for sim reproducibility.
            const ac = a.cells[0], bc = b.cells[0];
            if (ac.r !== bc.r) return ac.r - bc.r;
            return ac.c - bc.c;
          });
          const cl = detected[0];

          // Now actually consume the multipliers for this cluster.
          let appliedMult = 0;
          const traversals = [];
          for (let i = unclaimedMults.length - 1; i >= 0; i--) {
            const m = unclaimedMults[i];
            if (!m.sourceCell) continue;
            const inside = cl.cells.some(xy =>
              xy.r === m.sourceCell.r && xy.c === m.sourceCell.c);
            if (!inside) continue;
            appliedMult += m.value;
            traversals.push({ value: m.value, sourceCell: m.sourceCell });
            unclaimedMults.splice(i, 1);
          }
          if (appliedMult === 0) appliedMult = 1;

          // Per-cell pay (recomputed; same number as evaluateCluster gave).
          const basePay = COLOR_BY_NAME[cl.color].basePay;
          let perCellSum = 0;
          for (const xy of cl.cells) {
            const cellOnGrid = grid[xy.r][xy.c];
            let effective;
            if (cellOnGrid && cellOnGrid.wild) {
              effective = 1;
            } else {
              const oldStamp = cellMult[xy.r][xy.c] || 0;
              const newMult  = appliedMult > 1 ? appliedMult : 0;
              const m = Math.max(oldStamp, newMult);
              effective = m > 0 ? m : 1;
            }
            perCellSum += basePay * effective;
          }
          cascadePay += perCellSum;

          // Stamp non-wild cells if this cluster got a multiplier.
          if (appliedMult > 1) {
            for (const xy of cl.cells) {
              const cellOnGrid = grid[xy.r][xy.c];
              if (!cellOnGrid || cellOnGrid.wild) continue;
              const existing = cellMult[xy.r][xy.c] || 0;
              cellMult[xy.r][xy.c] = Math.max(existing, appliedMult);
            }
          }

          // Tag cells with wild state for the animator.
          const taggedCells = cl.cells.map(xy => ({
            r: xy.r, c: xy.c,
            wild: !!(grid[xy.r] && grid[xy.r][xy.c] && grid[xy.r][xy.c].wild),
          }));

          cascadePaidClusters.push({
            color: cl.color,
            cells: taggedCells,
            basePay: basePay * cl.cells.length,
            pay: perCellSum,
            appliedMult,
            traversals,
          });

          // Pop cluster cells (including any wilds it claimed). The next
          // iteration's findClusters runs against this smaller grid, so
          // those wilds can't pay again.
          for (const xy of cl.cells) {
            grid[xy.r][xy.c] = null;
          }
        }

        // Drop any multipliers whose source cluster didn't survive.
        ctx.appliedMults.length = 0;

        totalPayout += cascadePay;

        events.push({
          type: 'clusters',
          cascadeIndex: cas,
          clusters: cascadePaidClusters,
          cascadePay,
          // Animator uses this to drive multiplier-character traversals.
          // Each traversal is owned by exactly one cluster (the one whose
          // cells include the multiplier's sourceCell).
          multiplierTraversals: cascadePaidClusters.flatMap(cl => cl.traversals),
        });

        // ── Refill ──
        const { moves, spawns } = refill(grid);
        events.push({
          type: 'refill', cascadeIndex: cas,
          moves: moves.slice(), spawns: spawns.slice(),
          stickyWilds: currentWildPositions(),
          gridAfter: cloneGrid(grid),
        });
      }

      // 3. (Conveyor shift now runs at the START of runSpin, not here —
      //     so this spin's cluster intercepts use the same positions the
      //     player sees during the cascade animation.)

      // 4. Scatter end-of-spin: count, pay, and trigger / retrigger.
      _scattersOnGrid = countScattersIn(grid);
      const scatterCount = _scattersOnGrid;
      const scatterPayMult = SCATTER_PAYOUTS[scatterCount] ?? (
        // Cap at the highest defined tier; e.g. 7+ scatters pay the 6 rate.
        scatterCount > 6 ? SCATTER_PAYOUTS[6] : 0
      );
      const scatterPay = scatterPayMult * bet;
      let scatterTriggered = false;
      let scatterRetriggerSpins = 0;
      if (!state.inFreeSpin && scatterCount >= SCATTER_TRIGGER_COUNT) {
        scatterTriggered = true;
        state.freeSpinsBank += SCATTER_TRIGGER_SPINS;
      } else if (state.inFreeSpin && scatterCount >= SCATTER_RETRIGGER_COUNT) {
        scatterRetriggerSpins = SCATTER_RETRIGGER_SPINS;
        state.freeSpinsBank += SCATTER_RETRIGGER_SPINS;
      }

      if (ctx.freeSpinsAwarded > 0) state.freeSpinsBank += ctx.freeSpinsAwarded;

      const clusterWin = totalPayout * bet;
      const jackpotWin = ctx.jackpotPay;   // already in currency (locked spawn-bets)
      const finalWin = clusterWin + jackpotWin + scatterPay;

      events.push({
        type: 'spinEnd',
        clusterWin, jackpotWin, scatterPay, finalWin,
        droppedTokens: dropped,
        freeSpinsAwarded: ctx.freeSpinsAwarded,
        intercepts: ctx.intercepts,
        scatterCount, scatterTriggered, scatterRetriggerSpins,
      });

      return {
        events, bet,
        clusterWin, jackpotWin, scatterPay, finalWin,
        intercepts: ctx.intercepts,
        droppedTokens: dropped,
        freeSpinsAwarded: ctx.freeSpinsAwarded,
        scatterCount, scatterTriggered, scatterRetriggerSpins,
        finalGrid: grid,
      };
    }

    // ═══════════════════════════════════════════════════════════════════════
    // MODE HOOKS  —  engine/mode separation (BB-style)
    // ═══════════════════════════════════════════════════════════════════════
    // The ENGINE (runSpin + helpers above) is mode-agnostic in principle:
    // it loops conveyor-shift → token-spawn → cascade (cluster pays + token
    // intercepts + refill). Everything that's mode-specific (grid shape,
    // conveyor shape, symbol palette, token registry, pay model, scatter
    // rules) is exposed through hooks below.
    //
    // The first mode is `classic`: 7×7 grid, L-shaped conveyor, the token
    // set (multiplier / wild / freespins / tiny..grand) currently shipped.
    // A second mode added later defines its own hook object and registers
    // it under MODE_DEF.<key>; engine code reaches for `getModeDef().X`
    // instead of the closure-scoped constants.
    //
    // Hook surface (default impls match current behaviour):
    //
    //   ── Config (data) ──
    //     GAME, RING_SIZE, FINISH_POS
    //     COLORS, COLOR_BY_NAME
    //     TOKEN_SPAWN_CHANCE, TOKEN_TYPE_WEIGHTS, TOKEN_TYPE_WEIGHT_TOTAL
    //     MULTIPLIER_VALUES, MULTIPLIER_VALUE_WEIGHT_TOTAL
    //     JACKPOT_PAYS, FREESPIN_AWARD
    //     SCATTER_SPAWN_CHANCE, SCATTER_MAX_ON_GRID, SCATTER_PAYOUTS,
    //     SCATTER_TRIGGER_COUNT, SCATTER_RETRIGGER_COUNT,
    //     SCATTER_TRIGGER_SPINS, SCATTER_RETRIGGER_SPINS
    //
    //   ── Topology (geometry) ──
    //     ringCellsForSlot(r, c) → number[]    — which ring positions a
    //                                            slot cell can intercept
    //                                            tokens at.
    //     isValidCell(r, c)      → bool        — for non-rect grids; default
    //                                            uses GAME.ROWS/COLS.
    //
    //   ── Spawn / conveyor ──
    //     spawnSymbol(rngFn)             → cell
    //     spawnAnyCell(rngFn, gridState) → cell  (handles scatter etc.)
    //     maybeSpawnToken(conveyor, rngFn) → token | null
    //     shiftConveyor(conveyor)          → droppedTokens[]
    //
    //   ── Token registry ──
    //     activateToken(token, ctx, sourceCellRC) → fired result | null
    //                                                (engine pushes result
    //                                                 into intercepts list)
    //
    //   ── Scene / UI ──
    //     buildSceneFeatureWidget(scene, app, ctx) — optional per-mode UI
    //
    // To add a new mode:
    //   1. Define HOOKS_FOO that spreads MODE_HOOKS_DEFAULT and overrides
    //      whatever differs (grid dims, ring shape, token registry, etc.).
    //   2. MODE_DEF.foo = { ...HOOKS_FOO, key:'foo', name:'Foo', buildSceneFeatureWidget }.
    //   3. setMode('foo') to switch.
    //
    // The engine functions above (findClusters, refill, runSpin, etc.) will
    // be migrated pass-by-pass to read mode config via `getModeDef()` rather
    // than top-level closures — for the moment they still close over the
    // top-level consts. The hook object below MIRRORS those consts so that
    // call sites already using `getModeDef().X` see the canonical values.

    const MODE_HOOKS_DEFAULT = {
      // Identity (overridden per mode)
      key: '',
      name: '',

      // ── Config (mirror of top-level constants) ────────────────────────
      GAME, RING_SIZE, FINISH_POS,
      COLORS, COLOR_BY_NAME,
      TOKEN_SPAWN_CHANCE, TOKEN_TYPE_WEIGHTS, TOKEN_TYPE_WEIGHT_TOTAL,
      MULTIPLIER_VALUES, MULTIPLIER_VALUE_WEIGHT_TOTAL,
      JACKPOT_PAYS, FREESPIN_AWARD,
      SCATTER_SPAWN_CHANCE, SCATTER_MAX_ON_GRID, SCATTER_PAYOUTS,
      SCATTER_TRIGGER_COUNT, SCATTER_RETRIGGER_COUNT,
      SCATTER_TRIGGER_SPINS, SCATTER_RETRIGGER_SPINS,

      // ── Topology ──────────────────────────────────────────────────────
      ringCellsForSlot(r, c) { return ringCellsForSlot(r, c); },
      isValidCell(r, c) { return inBounds(r, c); },

      // ── Spawn / conveyor (defaults dispatch to closure functions) ─────
      spawnSymbol() { return spawnSymbol(); },
      spawnAnyCell() { return spawnAnyCell(); },
      maybeSpawnToken(conveyor, bet) { return maybeSpawnToken(conveyor, bet); },
      shiftConveyor(conveyor) { return shiftConveyor(conveyor); },

      // ── Token activation ──────────────────────────────────────────────
      activateToken(token, ctx, sourceCellRC, sourceClusterCells) {
        return activateToken(token, ctx, sourceCellRC, sourceClusterCells);
      },

      // ── Optional UI hook (per-mode scene widget) ──────────────────────
      buildSceneFeatureWidget(_scene, _app, _ctx) {},
    };

    // ── Mode: classic ─────────────────────────────────────────────────────
    // The shipped 7×7 / L-conveyor / current-token-set behaviour.
    const HOOKS_CLASSIC = { ...MODE_HOOKS_DEFAULT };

    let MODE = 'classic';
    const MODE_DEF = {
      classic: {
        ...HOOKS_CLASSIC,
        key: 'classic',
        name: 'Trail Catcher',
      },
    };
    function getModeDef() { return MODE_DEF[MODE] || MODE_DEF.classic; }
    function setMode(m) { if (MODE_DEF[m]) MODE = m; }

    // ── Stats / RTP tracker ──────────────────────────────────────────────────
    // Cumulative running counters across all spins in this session. RTP is
    // computed live as totalWin / totalWager (paid spins only — free spins
    // don't add to the wager, only to the win).
    const stats = {
      spins: 0,
      totalWager: 0,
      totalWin:   0,
      hitCount:   0,
      maxWin:     0,
      get rtp()     { return this.totalWager > 0 ? this.totalWin / this.totalWager : 0; },
      get hitRate() { return this.spins      > 0 ? this.hitCount / this.spins : 0; },
      get avgWin()  { return this.spins      > 0 ? this.totalWin / this.spins : 0; },
    };
    function resetStats() {
      stats.spins = 0; stats.totalWager = 0; stats.totalWin = 0;
      stats.hitCount = 0; stats.maxWin = 0;
    }

    // ── Expose ───────────────────────────────────────────────────────────────
    // Wraps runSpin so we keep a reference to the LAST result on
    // window.TrailCatcher._debug for inspection from the console.
    function runSpinDebug(bet, state) {
      const wasFree = !!(state && state.inFreeSpin);
      const r = runSpin(bet, state);
      // Update stats — paid spins add to wager; all spins add to win/hit.
      stats.spins += 1;
      if (!wasFree) stats.totalWager += bet;
      stats.totalWin += r.finalWin;
      if (r.finalWin > 0) stats.hitCount += 1;
      if (r.finalWin > stats.maxWin) stats.maxWin = r.finalWin;
      // Log detected clusters per cascade so the user can verify what
      // the engine considered a winning cluster.
      const clusterEvents = r.events.filter(e => e.type === 'clusters');
      if (clusterEvents.length === 0) {
        // Helpful: if no clusters paid, dump the spawned grid + colour
        // grid so we can sanity-check from outside.
        const spawn = r.events.find(e => e.type === 'spawn');
        if (spawn) {
          const colorGrid = spawn.grid.map(row => row.map(c => c ? (c.wild ? 'WILD' : c.color) : '.'));
          console.log('[TrailCatcher] spin: no clusters paid. Grid:');
          console.table(colorGrid);
        }
      } else {
        console.log('[TrailCatcher] spin paid', clusterEvents.length, 'cluster events:');
        for (const ev of clusterEvents) {
          console.log(
            `  cascade ${ev.cascadeIndex}:`,
            ev.clusters.map(cl => `${cl.color}×${cl.cells.length}=${cl.pay.toFixed(2)}`).join(', ')
          );
          // Diagnostic: which cluster cells reach which ring positions,
          // and whether a token sits at any of those positions. Helps
          // verify activation when something LOOKS like it should fire
          // but didn't.
          for (const cl of ev.clusters) {
            const edgeCells = cl.cells.filter(xy => xy.r === 0 || xy.c === GAME.COLS - 1);
            if (edgeCells.length === 0) {
              console.log(`    ${cl.color}: no edge cells (no token activation possible from this cluster)`);
            } else {
              const edgeProj = edgeCells.map(xy => `(${xy.r},${xy.c})→[${ringCellsForSlot(xy.r, xy.c).join(',')}]`).join(' ');
              console.log(`    ${cl.color}: edge cells project to → ${edgeProj}`);
            }
          }
        }
      }
      const cascadeIntercepts = r.intercepts || [];
      if (cascadeIntercepts.length === 0) {
        // Show what tokens were on the conveyor — helpful when player expected an activation.
        const snap = r.events.find(e => e.type === 'conveyorSnapshot');
        const tokens = snap?.tokens || [];
        if (tokens.length > 0) {
          console.log('[TrailCatcher] tokens on conveyor (none activated this spin):',
            tokens.map(t => `pos ${t.pos}=${t.type}${t.multValue ? `(${t.multValue}×)` : ''}`).join(', '));
        }
      } else {
        console.log('[TrailCatcher] tokens activated:',
          cascadeIntercepts.map(ic => `pos ${ic.ringPos}=${ic.token.type}${ic.token.multValue ? `(${ic.token.multValue}×)` : ''} via cell (${ic.clusterCellRC.r},${ic.clusterCellRC.c})`).join('; '));
      }
      window.TrailCatcher._debug = { lastResult: r };
      return r;
    }

    window.TrailCatcher = {
      runSpin: runSpinDebug,
      _runSpinRaw: runSpin,
      setRng, makeSeededRng,
      GAME, COLORS, COLOR_BY_NAME,
      RING_SIZE, FINISH_POS,
      TOKEN_SPAWN_CHANCE, TOKEN_TYPE_WEIGHTS,
      MULTIPLIER_VALUES, JACKPOT_PAYS, FREESPIN_AWARD,
      SCATTER_PAYOUTS, SCATTER_TRIGGER_COUNT, SCATTER_RETRIGGER_COUNT,
      SCATTER_TRIGGER_SPINS, SCATTER_RETRIGGER_SPINS,
      generateGrid, findClusters, refill,
      ringCellsForSlot,
      stats, resetStats,
      MODE_DEF, MODE_HOOKS_DEFAULT, HOOKS_CLASSIC, getModeDef, setMode,
      _debug: {},
    };

    // ═══════════════════════════════════════════════════════════════════════════
    // SCENE
    // ═══════════════════════════════════════════════════════════════════════════
    import * as PIXI from 'pixi.js';

    const FONT = "'Fredoka One', cursive";
    const gsap = window.gsap;

    // Wait for Fredoka One to be ready before any PIXI.Text is built —
    // otherwise the first render uses the fallback and looks wrong.
    await document.fonts.load('32px "Fredoka One"');

    // ── Asset preload ───────────────────────────────────────────────────────
    const spinButtonTexture = await PIXI.Assets.load('assets/spin_button.png');
    const infoButtonTexture = await PIXI.Assets.load('assets/info_button.png');

    const app = new PIXI.Application({
      resizeTo: window,
      backgroundColor: 0x0E1424,   // deep midnight navy — symbols pop on dark
      antialias: true,
      autoDensity: true,
      resolution: window.devicePixelRatio || 1,
    });
    app.view.id = 'pixi-canvas';
    document.body.appendChild(app.view);
    const bootMsg = document.getElementById('boot-msg');
    if (bootMsg) bootMsg.remove();

    // ── Global error surfacing ───────────────────────────────────────────────
    // Engine throws and unhandled promise rejections normally vanish into the
    // console while the canvas keeps a frozen frame. Hook both so the player
    // sees something — and so we can copy the stack out without DevTools.
    function _showCrashBanner(label, detail) {
      try {
        let el = document.getElementById('trail-crash');
        if (!el) {
          el = document.createElement('div');
          el.id = 'trail-crash';
          Object.assign(el.style, {
            position: 'fixed', left: '8px', right: '8px', bottom: '8px',
            padding: '10px 12px', background: 'rgba(80, 0, 0, 0.92)',
            color: '#FFECB3', font: '12px/1.4 monospace', borderRadius: '6px',
            border: '1px solid #FFD54F', zIndex: '99999',
            whiteSpace: 'pre-wrap', maxHeight: '40vh', overflow: 'auto',
          });
          document.body.appendChild(el);
        }
        el.textContent = `${label}\n${detail}`;
      } catch (_) { /* DOM might be gone — last-ditch */ }
    }
    window.addEventListener('error', (e) => {
      const err = e.error || e.message || e;
      console.error('[TrailCatcher] window error:', err);
      _showCrashBanner('TrailCatcher crashed', (err && err.stack) || String(err));
    });
    window.addEventListener('unhandledrejection', (e) => {
      const reason = e.reason || e;
      console.error('[TrailCatcher] unhandled rejection:', reason);
      _showCrashBanner('TrailCatcher: unhandled rejection', (reason && reason.stack) || String(reason));
    });

    // ── Player + UI state ────────────────────────────────────────────────────
    // Bet values copied from Bloom Burst.
    const BET_LEVELS = [1, 2, 5, 10, 20, 50, 100, 200];
    const player = { balance: 10000, bet: 1, busy: false };
    const fmtCash = n => `$${n.toFixed(2)}`;
    // Compact format for cramped UI surfaces (token chips, etc.):
    // drops decimals when whole, uses K/M suffixes for large values.
    const fmtCashCompact = n => {
      if (n >= 1000000) return `$${(n / 1000000).toFixed(1)}M`;
      if (n >= 10000)   return `$${Math.round(n / 1000)}K`;
      if (n >= 1000)    return `$${(n / 1000).toFixed(1)}K`;
      if (Number.isInteger(n)) return `$${n}`;
      return `$${n.toFixed(2)}`;
    };
    const colorToUint = hex => parseInt(hex.slice(1), 16);

    // ── Animation helpers (BB ports) ─────────────────────────────────────────
    // Smooth numeric count-up on a PIXI.Text. If a tween is already running
    // on the same text, picks up its CURRENT value rather than snapping
    // back to `fromVal` — keeps rapid successive updates from flickering.
    function tweenCount(textObj, fromVal, toVal, duration = 0.6, formatter = fmtCash) {
      if (!textObj) return;
      let startVal = fromVal;
      if (textObj._countTween) {
        const prev = textObj._countTween;
        try {
          const target = prev.targets && prev.targets()[0];
          if (target && typeof target.v === 'number') startVal = target.v;
        } catch (_) { /* fall back */ }
        prev.kill();
      }
      const o = { v: startVal };
      textObj._countTween = gsap.to(o, {
        v: toVal, duration, ease: 'power2.out',
        onUpdate: () => { textObj.text = formatter(o.v); },
        onComplete: () => { textObj.text = formatter(toVal); textObj._countTween = null; },
      });
    }

    // Big-bet celebration: elastic pop on the win pill.
    function pulseWinPill() {
      if (!scene.winPill || !scene.winPill.valText) return;
      const t = scene.winPill.valText;
      gsap.killTweensOf(t.scale);
      gsap.fromTo(t.scale,
        { x: 1.4, y: 1.4 },
        { x: 1, y: 1, duration: 0.6, ease: 'elastic.out(1, 0.4)' });
    }

    // Brief, decaying screen shake on app.stage. Cap concurrent shakes —
    // back-to-back jackpots fight each other for the transform otherwise.
    function shakeStage(amp = 8, durationSec = 0.45) {
      const stage = app.stage;
      gsap.killTweensOf(stage);
      const origX = stage.x || 0, origY = stage.y || 0;
      stage.x = origX; stage.y = origY;
      gsap.to(stage, {
        duration: durationSec, ease: 'power2.out',
        onUpdate() {
          const t = this.progress();
          const k = (1 - t) * amp;
          stage.x = origX + (Math.random() - 0.5) * 2 * k;
          stage.y = origY + (Math.random() - 0.5) * 2 * k;
        },
        onComplete() { stage.x = origX; stage.y = origY; },
      });
    }

    // Tiny white-yellow flash drawn at impact site — used by sparkle stream.
    // Smoke puff at the Creating tile — bigger plume of grey/white smoke
    // drifting upward + outward, fading. Called at spin-start whether or
    // not a token actually spawns this spin.
    function spawnSmokePuff(container, x, y, intensity = 1) {
      const cellSize = L && L.cellSize ? L.cellSize : 90;
      const count = 16 + Math.floor(8 * intensity);
      for (let i = 0; i < count; i++) {
        const r = (cellSize * 0.10) + Math.random() * (cellSize * 0.12);
        const puff = new PIXI.Graphics();
        const grey = 190 + Math.floor(Math.random() * 50);
        const hex = (grey << 16) | (grey << 8) | grey;
        puff.beginFill(hex, 0.85);
        puff.drawCircle(0, 0, r);
        puff.endFill();
        const sx = x + (Math.random() - 0.5) * cellSize * 0.55;
        const sy = y + (Math.random() - 0.5) * cellSize * 0.35;
        puff.x = sx; puff.y = sy;
        puff.alpha = 0; puff.scale.set(0.4);
        container.addChild(puff);
        // Contained drift — stays near the Creating tile rather than
        // climbing toward the title row.
        const drift    = cellSize * (0.30 + Math.random() * 0.30);
        const sideways = (Math.random() - 0.5) * cellSize * 0.45;
        const delay = i * 0.025;
        const dur = 0.95 + Math.random() * 0.45;
        gsap.timeline({ delay, onComplete: () => puff.destroy() })
          .to(puff,       { alpha: 0.85, duration: 0.18, ease: 'power2.out' }, 0)
          .to(puff.scale, { x: 2.4, y: 2.4, duration: dur, ease: 'sine.out' }, 0)
          .to(puff,       { x: sx + sideways, y: sy - drift, duration: dur, ease: 'sine.out' }, 0)
          .to(puff,       { alpha: 0, duration: 0.50, ease: 'power2.in' }, dur - 0.50);
      }
      // A brief warm flash at the portal mouth to punctuate the spawn.
      const flash = new PIXI.Graphics();
      flash.beginFill(0x6FE0D6, 0.55);
      flash.drawCircle(0, 0, cellSize * 0.30);
      flash.endFill();
      flash.beginFill(0xFFFFFF, 0.85);
      flash.drawCircle(0, 0, cellSize * 0.16);
      flash.endFill();
      flash.x = x; flash.y = y; flash.alpha = 0;
      container.addChild(flash);
      gsap.timeline({ onComplete: () => flash.destroy() })
        .to(flash,       { alpha: 1, duration: 0.10, ease: 'power2.out' }, 0)
        .to(flash.scale, { x: 1.8, y: 1.8, duration: 0.45, ease: 'power2.out' }, 0)
        .to(flash,       { alpha: 0, duration: 0.40, ease: 'power2.in' }, 0.10);
    }

    // Destroy effect at the Destroying tile — short particle burst when a
    // token reaches the off-grid sink and is removed.
    function spawnDestroyEffect(container, x, y) {
      // Red/orange spark burst.
      for (let i = 0; i < 10; i++) {
        const spark = new PIXI.Graphics();
        const r = 2 + Math.random() * 3;
        const colors = [0xC04848, 0xE8786C, 0xFFAE5C];
        spark.beginFill(colors[i % colors.length], 0.95);
        spark.drawCircle(0, 0, r);
        spark.endFill();
        spark.x = x; spark.y = y;
        container.addChild(spark);
        const a = Math.random() * Math.PI * 2;
        const d = 18 + Math.random() * 22;
        gsap.timeline({ onComplete: () => spark.destroy() })
          .to(spark, {
            x: x + Math.cos(a) * d, y: y + Math.sin(a) * d,
            duration: 0.40 + Math.random() * 0.15, ease: 'power2.out',
          }, 0)
          .to(spark, { alpha: 0, duration: 0.35, ease: 'power2.in' }, 0.10);
      }
      // Quick flash.
      const flash = new PIXI.Graphics();
      flash.beginFill(0xFFFFFF, 0.85);
      flash.drawCircle(0, 0, 8);
      flash.endFill();
      flash.beginFill(0xC04848, 0.6);
      flash.drawCircle(0, 0, 16);
      flash.endFill();
      flash.x = x; flash.y = y;
      container.addChild(flash);
      gsap.timeline({ onComplete: () => flash.destroy() })
        .to(flash.scale, { x: 2.0, y: 2.0, duration: 0.30, ease: 'power2.out' }, 0)
        .to(flash,       { alpha: 0,        duration: 0.30, ease: 'power2.in' }, 0);
    }

    function spawnImpactFlash(container, x, y) {
      const f = new PIXI.Graphics();
      f.beginFill(0xFFFFFF, 0.85);
      f.drawCircle(0, 0, 5);
      f.endFill();
      f.beginFill(0xFFD54F, 0.5);
      f.drawCircle(0, 0, 10);
      f.endFill();
      f.x = x + (Math.random() - 0.5) * 6;
      f.y = y + (Math.random() - 0.5) * 6;
      container.addChild(f);
      gsap.to(f, {
        alpha: 0, duration: 0.30, ease: 'power2.out',
        onComplete: () => f.destroy(),
      });
      gsap.to(f.scale, { x: 1.8, y: 1.8, duration: 0.30, ease: 'power2.out' });
    }

    // Bright, glowing cross-shaped sparkles flying from (fromX, fromY) to
    // (toX, toY) along quadratic-bezier arcs. Used for jackpot intercepts —
    // sells the "money is flying to the win pill" beat.
    function spawnSparkleStream(container, fromX, fromY, toX, toY, count = 18) {
      // Source puff: tiny white specks scatter outward.
      for (let i = 0; i < 6; i++) {
        const spark = new PIXI.Graphics();
        const r = 2 + Math.random() * 2;
        spark.beginFill(0xFFFFFF, 0.9);
        spark.drawCircle(0, 0, r);
        spark.endFill();
        spark.x = fromX; spark.y = fromY;
        container.addChild(spark);
        const a = Math.random() * Math.PI * 2;
        const d = 14 + Math.random() * 22;
        gsap.to(spark, {
          x: fromX + Math.cos(a) * d,
          y: fromY + Math.sin(a) * d,
          alpha: 0,
          duration: 0.35 + Math.random() * 0.20,
          ease: 'power2.out',
          onComplete: () => spark.destroy(),
        });
      }

      for (let i = 0; i < count; i++) {
        const g = new PIXI.Graphics();
        const size = 5 + Math.random() * 4;
        g.beginFill(0xFFD54F, 0.45); g.drawCircle(0, 0, size * 2.2); g.endFill();
        g.beginFill(0xFFEB3B, 0.75); g.drawCircle(0, 0, size * 1.3); g.endFill();
        const armL = size * 1.8, armW = size * 0.55;
        g.beginFill(0xFFFFFF, 1);
        g.drawRoundedRect(-armL, -armW / 2, armL * 2, armW, armW / 2);
        g.drawRoundedRect(-armW / 2, -armL, armW, armL * 2, armW / 2);
        g.endFill();
        g.beginFill(0xFFFFFF, 1); g.drawCircle(0, 0, size * 0.6); g.endFill();

        const sx = fromX + (Math.random() - 0.5) * 30;
        const sy = fromY + (Math.random() - 0.5) * 30;
        g.x = sx; g.y = sy;
        g.alpha = 0; g.scale.set(0.4);
        g.rotation = Math.random() * Math.PI;
        container.addChild(g);

        const delay = i * 0.022 + Math.random() * 0.025;
        const duration = 0.55 + Math.random() * 0.20;
        const midX = (sx + toX) / 2 + (Math.random() - 0.5) * 100;
        const midY = Math.min(sy, toY) - 70 - Math.random() * 60;

        gsap.to(g,       { alpha: 1, duration: 0.10, delay, ease: 'power2.out' });
        gsap.to(g.scale, { x: 1, y: 1, duration: 0.18, delay, ease: 'back.out(2)' });
        gsap.to(g, {
          rotation: g.rotation + Math.PI * (1.5 + Math.random() * 1.5),
          duration, delay, ease: 'none',
        });
        gsap.to(g.scale, {
          x: 1.25, y: 1.25, duration: duration * 0.55, delay: delay + 0.12,
          ease: 'sine.inOut', yoyo: true, repeat: 1,
        });
        const s = { t: 0 };
        gsap.to(s, {
          t: 1, duration, delay, ease: 'power2.in',
          onUpdate: () => {
            const t = s.t, omt = 1 - t;
            g.x = omt * omt * sx + 2 * omt * t * midX + t * t * toX;
            g.y = omt * omt * sy + 2 * omt * t * midY + t * t * toY;
          },
          onComplete: () => {
            spawnImpactFlash(container, toX, toY);
            gsap.to(g.scale, { x: 1.8, y: 1.8, duration: 0.12, ease: 'power2.out' });
            gsap.to(g, { alpha: 0, duration: 0.18, ease: 'power2.in', onComplete: () => g.destroy() });
          },
        });
      }
    }

    function cycleBet(dir = +1) {
      let i = BET_LEVELS.indexOf(player.bet);
      if (i < 0) i = 0;
      i = Math.max(0, Math.min(BET_LEVELS.length - 1, i + dir));
      player.bet = BET_LEVELS[i];
      refreshHUD();
      // Repaint conveyor tokens — jackpot tokens show LIVE cash value
      // (bet × tier), so the label needs to refresh when bet changes.
      if (typeof animator !== 'undefined' && animator && game && game.state) {
        animator._restoreConveyor(game.state.conveyor);
      }
    }

    // ── Layout ───────────────────────────────────────────────────────────────
    // Sized to fit between title (above) and HUD (below), but capped so the
    // frame never fills the canvas edge-to-edge. FILL_RATIO leaves explicit
    // breathing room; MAX_CELL caps the upper bound on huge monitors.
    const DESIGN_CELL_REF = 96;     // canonical cell size used to derive gameScale
    const GAP_RATIO = 8 / 96;       // cellGap / cellSize ratio from the design
    const TITLE_RATIO = 80 / 96;    // titleH / cellSize
    const HUD_RATIO   = 200 / 96;   // hudReserve / cellSize (pills + spin button)
    const FRAME_HPAD  = 80;         // px of horizontal margin around the frame
    const FILL_RATIO  = 0.82;       // shrink the fit to leave canvas margin
    const MAX_CELL    = 96;         // hard cap so frame never balloons on 4K
    let _layoutCache = null;
    function layout() {
      const sw = app.screen.width, sh = app.screen.height;
      if (_layoutCache && _layoutCache.sw === sw && _layoutCache.sh === sh) {
        return _layoutCache;
      }
      // Find the largest cellSize that fits horizontally AND vertically,
      // multiplied by FILL_RATIO for breathing room and capped by MAX_CELL.
      // Frame footprint: (GAME.COLS+1) wide × (GAME.ROWS+1) tall in cells
      // (slot grid + one conveyor row on top + one conveyor col on right).
      const FRAME_W_CELLS = GAME.COLS + 1;
      const FRAME_H_CELLS = GAME.ROWS + 1;
      const horizK = FRAME_W_CELLS + (FRAME_W_CELLS - 1) * GAP_RATIO;
      const vertK  = FRAME_H_CELLS + (FRAME_H_CELLS - 1) * GAP_RATIO + TITLE_RATIO + HUD_RATIO;
      const cellH  = (sw - 2 * FRAME_HPAD) / horizK;
      const cellV  = sh / vertK;
      let cellSize = Math.min(cellH, cellV) * FILL_RATIO;
      cellSize = Math.min(cellSize, MAX_CELL);
      cellSize = Math.max(20, Math.floor(cellSize));
      const cellGap  = cellSize * GAP_RATIO;
      const gameScale = cellSize / DESIGN_CELL_REF;
      const frameSize = cellSize * FRAME_W_CELLS + cellGap * (FRAME_W_CELLS - 1);
      const frameH    = cellSize * FRAME_H_CELLS + cellGap * (FRAME_H_CELLS - 1);
      const frameX = (sw - frameSize) / 2;
      const titleH = cellSize * TITLE_RATIO;
      const hudReserve = cellSize * HUD_RATIO;
      // Centre the frame in whatever vertical space is left after title+HUD.
      const availH = sh - titleH - hudReserve;
      const frameY = titleH + Math.max(0, (availH - frameH)) / 2;
      _layoutCache = { sw, sh, gameScale, cellSize, cellGap, frameSize, frameH, frameX, frameY, titleH, hudReserve };
      return _layoutCache;
    }
    function _invalidateLayout() { _layoutCache = null; }
    let L = layout();

    // ── Coordinate helpers (operate in stage coords) ────────────────────────
    function slotCellCenter(r, c) {
      return {
        x: L.frameX + (L.cellSize + L.cellGap) * c + L.cellSize / 2,
        y: L.frameY + (L.cellSize + L.cellGap) * (r + 1) + L.cellSize / 2,
      };
    }
    function ringCellCenter(pos) {
      let visR, visC;
      // pos 0          : Creating tile — LEFT of pos 1, pushed clear of frame.
      // pos 1..COLS    : top edge over slot cols 0..COLS-1.
      // pos COLS+1..COLS+ROWS : right edge over slot rows 0..ROWS-1.
      // pos FINISH_POS : Destroying tile — RIGHT of last conveyor cell.
      if (pos === 0) {
        const gap = Math.max(L.cellGap, 22 * L.gameScale);
        return {
          x: L.frameX - L.cellSize / 2 - gap,
          y: L.frameY + L.cellSize / 2,
        };
      }
      if (pos === FINISH_POS) {
        const gap = Math.max(L.cellGap, 22 * L.gameScale);
        return {
          x: L.frameX + L.frameSize + L.cellSize / 2 + gap,
          y: L.frameY + (L.cellSize + L.cellGap) * GAME.ROWS + L.cellSize / 2,
        };
      }
      if (pos >= 1 && pos <= GAME.COLS) {
        visR = 0; visC = pos - 1;
      } else if (pos >= GAME.COLS + 1 && pos <= GAME.COLS + GAME.ROWS) {
        visR = pos - GAME.COLS;     // = (pos - COLS - 1) + 1 → slot row r at visR=r+1
        visC = GAME.COLS;
      } else return null;
      return {
        x: L.frameX + (L.cellSize + L.cellGap) * visC + L.cellSize / 2,
        y: L.frameY + (L.cellSize + L.cellGap) * visR + L.cellSize / 2,
      };
    }

    // ── Symbol factory ───────────────────────────────────────────────────────
    function makeSlotSymbol(cell, cellSize) {
      const c = new PIXI.Container();
      if (!cell) return c;

      // Scatter: gold star-burst on a deep purple chip. Visually distinct
      // from regular symbols so the player recognizes it at a glance.
      if (cell.scatter) {
        const r = cellSize * 0.42;
        const bg = new PIXI.Graphics();
        bg.lineStyle(2, 0xFFD54F, 1);
        bg.beginFill(0x4A1A6B, 1);
        bg.drawRoundedRect(-r, -r, r * 2, r * 2, r * 0.30);
        bg.endFill();
        c.addChild(bg);
        // 8-point star.
        const star = new PIXI.Graphics();
        star.beginFill(0xFFD54F, 1);
        const pts = [];
        const outer = r * 0.62, inner = r * 0.28;
        for (let i = 0; i < 16; i++) {
          const a = (i / 16) * Math.PI * 2 - Math.PI / 2;
          const rad = (i % 2 === 0) ? outer : inner;
          pts.push(Math.cos(a) * rad, Math.sin(a) * rad);
        }
        star.drawPolygon(pts);
        star.endFill();
        c.addChild(star);
        c.symbolScatter = true;
        return c;
      }

      // Wild = its own distinct symbol. Doesn't show the underlying color.
      // Per spec: WILD is a SYMBOL, not a cover — once a cell is wild, the
      // wild visual sits on the grid permanently, and cascading symbols
      // flow underneath (handled in engine refill + cluster pop).
      if (cell.wild) {
        const r = cellSize * 0.42;
        const bg = new PIXI.Graphics();
        bg.lineStyle(3, 0x2A1808, 0.95);
        bg.beginFill(0xFFD54F, 1);
        bg.drawRoundedRect(-r, -r, r * 2, r * 2, r * 0.30);
        bg.endFill();
        // Inner ring + diamond for the WILD identity.
        bg.lineStyle(2, 0x8A5A18, 0.7);
        bg.drawRoundedRect(-r * 0.85, -r * 0.85, r * 1.7, r * 1.7, r * 0.22);
        c.addChild(bg);
        const w = new PIXI.Text('WILD', {
          fontFamily: FONT,
          fontSize: cellSize * 0.26,
          fill: 0x2A1808,
          stroke: 0xFFECB3,
          strokeThickness: Math.max(2, cellSize * 0.025),
          fontWeight: 'bold',
          letterSpacing: 1,
        });
        w.anchor.set(0.5);
        c.addChild(w);
        c.symbolColor = cell.color;   // preserved for engine math (wild matches any color)
        c.symbolWild = true;
        return c;
      }

      const colorHex = colorToUint(window.TrailCatcher.COLOR_BY_NAME[cell.color].hex);
      const g = new PIXI.Graphics();
      const r = cellSize * 0.42;
      g.lineStyle(2, 0x2A1808, 0.95);
      g.beginFill(colorHex, 1);
      g.drawRoundedRect(-r, -r, r * 2, r * 2, r * 0.30);
      g.endFill();
      g.lineStyle(0);
      g.beginFill(0xFFFFFF, 0.22);
      g.drawRoundedRect(-r * 0.7, -r * 0.7, r * 0.6, r * 0.3, r * 0.15);
      g.endFill();
      c.addChild(g);
      c.symbolColor = cell.color;
      c.symbolWild = false;
      return c;
    }

    function makeTokenSprite(token, cellSize) {
      const c = new PIXI.Container();
      // Two-line labels: a short top tag (TYPE) + a value/payout below.
      // Wild has only the WILD tag (no payout). Freespins shows the
      // award. Jackpot tiers show their multiplier (e.g. 100×).
      const FS = window.TrailCatcher.FREESPIN_AWARD;
      const JP = window.TrailCatcher.JACKPOT_PAYS;
      // Visual identity per type. `fill` is the bright core, `rim` is a
      // contrasting bright accent ring. Jackpot tiers wear a gold rim
      // (signals "money"); multiplier / wild / freespins wear rims
      // matched to their core hue (no money signal — use type colour).
      const TOKEN_VISUALS = {
        multiplier: { fill: 0x3DAEEB, rim: 0x9DDDF7, top: t => `${t.multValue}×`, bot: () => '' },
        wild:       { fill: 0xFFD23F, rim: 0xFFFFFF, top: () => 'WILD',       bot: () => '' },
        freespins:  { fill: 0x5FE6A8, rim: 0xC4F5DC, top: () => 'FREE',       bot: () => `+${FS}` },
        tiny:       { fill: 0xFFB084, rim: 0xFFD54F, top: () => 'TINY',       bot: () => fmtCashCompact(JP.tiny  * player.bet) },
        mini:       { fill: 0xFFA62F, rim: 0xFFD54F, top: () => 'MINI',       bot: () => fmtCashCompact(JP.mini  * player.bet) },
        major:      { fill: 0xFF4D6D, rim: 0xFFD54F, top: () => 'MAJOR',      bot: () => fmtCashCompact(JP.major * player.bet) },
        grand:      { fill: 0xB574FF, rim: 0xFFD54F, top: () => 'GRAND',      bot: () => fmtCashCompact(JP.grand * player.bet) },
      };
      const v = TOKEN_VISUALS[token.type] || TOKEN_VISUALS.tiny;
      const r = cellSize * 0.40;        // bigger — tokens are the star

      // Outer halo — soft glow that breaks the chip out of the dark
      // conveyor cell. Uses the rim colour at low alpha.
      const halo = new PIXI.Graphics();
      halo.beginFill(v.rim, 0.30);
      halo.drawCircle(0, 0, r * 1.18);
      halo.endFill();
      c.addChild(halo);

      // Main body: dark outline → bright rim ring → core fill.
      const body = new PIXI.Graphics();
      body.lineStyle(2, 0x0E1424, 0.95);     // dark outline against any bg
      body.beginFill(v.rim, 1);
      body.drawCircle(0, 0, r);
      body.endFill();
      // Inner core, slightly inset, in the type colour.
      body.lineStyle(0);
      body.beginFill(v.fill, 1);
      body.drawCircle(0, 0, r * 0.84);
      body.endFill();
      // Top-left highlight arc — adds depth without a full gradient.
      body.beginFill(0xFFFFFF, 0.22);
      body.drawCircle(-r * 0.30, -r * 0.32, r * 0.28);
      body.endFill();
      c.addChild(body);
      const topStr = v.top(token);
      const botStr = v.bot(token);
      const hasBot = botStr && botStr.length > 0;
      const topY = hasBot ? -cellSize * 0.07 : 0;
      const botY = hasBot ? cellSize * 0.13 : 0;
      const topSize = hasBot ? cellSize * 0.16 : cellSize * 0.22;
      const botSize = cellSize * 0.22;
      const top = new PIXI.Text(topStr, {
        fontFamily: FONT, fontSize: topSize,
        fill: 0x2A1808, fontWeight: 'bold', letterSpacing: 0.5,
      });
      top.anchor.set(0.5);
      top.y = topY;
      c.addChild(top);
      if (hasBot) {
        const bot = new PIXI.Text(botStr, {
          fontFamily: FONT, fontSize: botSize,
          fill: 0x2A1808, fontWeight: 'bold',
        });
        bot.anchor.set(0.5);
        bot.y = botY;
        // Shrink to fit inside the token circle (max width ~ 1.5 × radius).
        const maxBotW = r * 1.5;
        if (bot.width > maxBotW) {
          const k = maxBotW / bot.width;
          bot.scale.set(k);
        }
        c.addChild(bot);
      }
      // Same shrink for the top label so e.g. "MAJOR" / "GRAND" don't clip.
      const maxTopW = r * 1.5;
      if (top.width > maxTopW) {
        const k = maxTopW / top.width;
        top.scale.set(k);
      }
      c.tokenType = token.type;
      c.tokenPos  = token.pos;
      c.tokenVal  = token.multValue || null;
      return c;
    }

    // BB Bloom-Tiles formatter: integers plain ("8×"), halves with one
    // decimal ("2.5×"). PP only ever sums integer multipliers right now
    // but the helper handles fractional values just in case.
    function fmtMultLabel(v) {
      if (Number.isInteger(v)) return `${v}×`;
      return `${v.toFixed(1)}×`;
    }
    // Gold halo painted BEHIND a stamped cell (BB Bloom-Tiles pattern).
    // Returns a Graphics positioned at cell-centre (absolute screen coords);
    // alpha scales with multiplier value so a 100× cell glows brighter
    // than a 2× cell, capped so it never washes out the symbol.
    function makeCellTint(value, cellSize, screenX, screenY) {
      const g = new PIXI.Graphics();
      const radius = cellSize * 0.44;
      const targetA = Math.min(0.50, 0.20 + Math.log10(1 + value) * 0.10);
      g.beginFill(0xFFC837, 1);
      g.drawCircle(0, 0, radius);
      g.endFill();
      g.x = screenX; g.y = screenY;
      g.alpha = 0;
      g._targetAlpha = targetA;
      return g;
    }
    // Big gold "N×" text painted BEHIND the cell symbol — represents the
    // multiplier sitting on the GRID surface (not on the symbol itself).
    function makeCellMultText(value, cellSize, screenX, screenY) {
      const fontSize = Math.max(18, Math.floor(cellSize * 0.52));
      const stroke = Math.max(3, cellSize * 0.06);
      const t = new PIXI.Text(fmtMultLabel(value), {
        fontFamily: FONT, fontSize,
        fill: 0xFFD54F, stroke: 0x3D1C02,
        strokeThickness: stroke,
        fontWeight: 'bold', letterSpacing: 0.4,
      });
      t.anchor.set(0.5);
      t.x = screenX; t.y = screenY;
      t.alpha = 0; t.scale.set(0.6);
      return t;
    }
    // Small dark pill in the upper-right corner of a cell — the legible
    // read-out for the multiplier sitting on the grid (BB pattern). Sits
    // ABOVE the cell symbol so it stays visible regardless of what symbol
    // is currently dropped onto the multiplier.
    function makeTileBadge(value, cellSize, cellLeft, cellTop) {
      const cont = new PIXI.Container();
      const gs = L.gameScale || 1;
      const padX = Math.max(5, 10 * gs);
      const h    = Math.max(14, 26 * gs);
      const inset = 10 * gs;
      const text = new PIXI.Text(fmtMultLabel(value), {
        fontFamily: FONT,
        fontSize: Math.max(9, 15 * gs),
        fill: 0xFFECB3,
        stroke: 0x3D1C02,
        strokeThickness: Math.max(1.25, 2.5 * gs),
        fontWeight: 'bold',
      });
      text.anchor.set(0.5);
      const bg = new PIXI.Graphics();
      const drawBg = () => {
        const w = text.width + padX * 2;
        bg.clear();
        bg.lineStyle(1.5 * gs, 0xFFD54F, 0.9);
        bg.beginFill(0x3D1C02, 0.92);
        bg.drawRoundedRect(-w / 2, -h / 2, w, h, h * 0.5);
        bg.endFill();
      };
      drawBg();
      cont.addChild(bg);
      cont.addChild(text);
      // Anchor: top-right of cell, with `inset` padding from edge.
      const w = text.width + padX * 2;
      cont.x = cellLeft + cellSize - inset - w / 2;
      cont.y = cellTop + inset + h / 2;
      cont._badgeText = text;
      cont._redraw = drawBg;
      cont._height = h;
      cont._padX = padX;
      cont._inset = inset;
      cont._cellLeft = cellLeft;
      cont._cellSize = cellSize;
      return cont;
    }

    // ── HUD pill (dark slate capsule with gold border + label + value) ─
    function makePill({ x, y, label, value, width, accent, interactive, onClick }) {
      const cont = new PIXI.Container();
      cont.x = x; cont.y = y;
      const gs = L.gameScale;
      const pw = width || 210 * gs;
      const ph = 58 * gs;
      const bg = new PIXI.Graphics();
      const draw = (hover = false) => {
        bg.clear();
        bg.lineStyle(2 * gs, accent || 0xC9A24A, 0.95);
        bg.beginFill(hover ? 0x2C3552 : 0x1A2238, 0.92);
        bg.drawRoundedRect(-pw / 2, -ph / 2, pw, ph, ph * 0.32);
        bg.endFill();
      };
      draw();
      cont.addChild(bg);
      const lbl = new PIXI.Text(label, {
        fontFamily: FONT, fontSize: 13 * gs,
        fill: accent || 0xD4A017, letterSpacing: 1.2,
      });
      lbl.anchor.set(0.5);
      lbl.y = -ph * 0.24;
      cont.addChild(lbl);
      const val = new PIXI.Text(value, {
        fontFamily: FONT, fontSize: 26 * gs, fill: 0xFFECB3,
      });
      val.anchor.set(0.5);
      val.y = ph * 0.13;
      cont.addChild(val);
      if (interactive) {
        cont.eventMode = 'static'; cont.cursor = 'pointer';
        cont.hitArea = new PIXI.RoundedRectangle(-pw / 2, -ph / 2, pw, ph, ph * 0.32);
        cont.on('pointerover', () => {
          // Don't react while a spin is in flight — the bet pill is gated
          // off in refreshBetControlsEnabled, but the pointer hover would
          // still pop scale otherwise.
          if (scene.spinBtn && scene.spinBtn.busy) return;
          draw(true);
          gsap.to(cont.scale, { x: 1.03, y: 1.03, duration: 0.12, ease: 'sine.out' });
        });
        cont.on('pointerout', () => {
          if (scene.spinBtn && scene.spinBtn.busy) return;
          draw(false);
          gsap.to(cont.scale, { x: 1, y: 1, duration: 0.12 });
        });
        cont.on('pointertap', onClick || (() => {}));
      }
      cont.valText = val;
      cont.labelText = lbl;
      cont.redrawBg = draw;
      return cont;
    }

    // ── Paytable modal (BB-style: warm cream panel, tabs, close button) ─────
    // ── Reusable simple modal (BB port) ──────────────────────────────────────
    // Title + body lines + buttons. Auto-fits font from a 28→12 ladder so
    // any body length and screen size produce a readable, non-overflowing
    // dialog. Each modal increments _openSimpleModalCount; the spacebar
    // handler reads this so an open popup swallows space.
    let _openSimpleModalCount = 0;
    function _openSimpleModal({ title, bodyLines, buttons }) {
      const sw = L.sw, sh = L.sh;
      const scale = Math.min(1, Math.min(sw / 900, sh / 900));

      const modal = new PIXI.Container();
      modal.alpha = 0;
      modal._isSimpleModal = true;
      _openSimpleModalCount++;
      app.stage.addChild(modal);

      const backdrop = new PIXI.Graphics();
      backdrop.beginFill(0x000000, 0.72);
      backdrop.drawRect(0, 0, sw, sh);
      backdrop.endFill();
      backdrop.eventMode = 'static';
      modal.addChild(backdrop);

      const panelW = Math.min(sw * 0.85, 540 * scale);
      const btnH   = Math.max(44, 56 * scale);
      const btnFS  = Math.max(16, 20 * scale);
      const padY   = 28 * scale;
      const wrapW  = panelW - padY * 2;

      let titleFS = Math.max(14, 32 * scale);
      if (title) {
        const probe = new PIXI.Text(title, { fontFamily: FONT, fontSize: titleFS });
        if (probe.width > wrapW) {
          titleFS = Math.max(14, titleFS * (wrapW / probe.width));
        }
        probe.destroy();
      }

      const titleH  = titleFS + 12 * scale;
      const btnRowH = btnH + padY;
      const maxPanelH = sh * 0.88;
      const maxBodyH  = maxPanelH - (padY + titleH + padY * 0.5 + padY + btnRowH);

      const FONT_CANDIDATES = [28, 24, 22, 20, 18, 16, 14, 13, 12];
      let chosenFS = FONT_CANDIDATES[FONT_CANDIDATES.length - 1] * scale;
      let chosenLineGap = 8 * scale;
      let chosenBodyH = 0;
      let chosenLineHeights = [];
      for (const candidate of FONT_CANDIDATES) {
        const fs = candidate * scale;
        const gap = Math.max(4, fs * 0.36);
        const heights = [];
        let totalH = 0;
        for (const line of bodyLines) {
          const isEmphasis = line.emphasis === true;
          const lineFS = isEmphasis ? fs * 1.4 : fs;
          const probe = new PIXI.Text(line.text ?? line, {
            fontFamily: FONT, fontSize: lineFS,
            wordWrap: true, wordWrapWidth: wrapW,
          });
          const h = probe.height;
          heights.push(h);
          totalH += h + gap;
          probe.destroy();
        }
        if (heights.length) totalH -= gap;
        if (totalH <= maxBodyH) {
          chosenFS = fs; chosenLineGap = gap; chosenBodyH = totalH; chosenLineHeights = heights; break;
        }
        chosenFS = fs; chosenLineGap = gap; chosenBodyH = totalH; chosenLineHeights = heights;
      }
      const bodyFS = chosenFS;
      const lineGap = chosenLineGap;
      const bodyH = chosenBodyH;
      const lineHeights = chosenLineHeights;

      const panelH = padY + titleH + padY * 0.5 + bodyH + padY + btnRowH;
      const panelX = (sw - panelW) / 2;
      const panelY = (sh - panelH) / 2;

      const panel = new PIXI.Graphics();
      panel.lineStyle(3 * scale, 0xC9A24A, 0.95);
      panel.beginFill(0x12172A, 0.98);   // matches dark theme bg family
      panel.drawRoundedRect(panelX, panelY, panelW, panelH, 24 * scale);
      panel.endFill();
      modal.addChild(panel);

      if (title) {
        const t = new PIXI.Text(title, {
          fontFamily: FONT, fontSize: titleFS,
          fill: 0xFFD54F, letterSpacing: 0.8, align: 'center',
        });
        t.anchor.set(0.5, 0);
        t.x = panelX + panelW / 2;
        t.y = panelY + padY;
        modal.addChild(t);
      }

      let lineY = panelY + padY + titleH + padY * 0.5;
      for (let i = 0; i < bodyLines.length; i++) {
        const line = bodyLines[i];
        const isEmphasis = line.emphasis === true;
        const t = new PIXI.Text(line.text ?? line, {
          fontFamily: FONT,
          fontSize: isEmphasis ? bodyFS * 1.4 : bodyFS,
          fill: isEmphasis ? 0xFFD54F : 0xFFECB3,
          align: 'center',
          wordWrap: true, wordWrapWidth: wrapW,
        });
        t.anchor.set(0.5, 0);
        t.x = panelX + panelW / 2;
        t.y = lineY;
        modal.addChild(t);
        const h = (lineHeights && lineHeights[i] != null) ? lineHeights[i] : t.height;
        lineY += h + lineGap;
      }

      let _closed = false;
      const close = () => {
        if (_closed) return;
        _closed = true;
        _openSimpleModalCount = Math.max(0, _openSimpleModalCount - 1);
        gsap.to(modal, {
          alpha: 0, duration: 0.15, ease: 'power2.in',
          onComplete: () => modal.destroy({ children: true }),
        });
      };

      const btnCount = buttons.length;
      const btnGap = 16 * scale;
      const btnW = (panelW - padY * 2 - btnGap * (btnCount - 1)) / btnCount;
      const btnY = panelY + panelH - padY - btnH / 2;
      buttons.forEach((b, i) => {
        const bx = panelX + padY + btnW * i + btnGap * i + btnW / 2;
        const bcont = new PIXI.Container();
        bcont.x = bx; bcont.y = btnY;
        const bbg = new PIXI.Graphics();
        const drawBtnBg = (hover) => {
          bbg.clear();
          bbg.lineStyle(2 * scale, b.stroke || 0xFFFFFF, 0.9);
          bbg.beginFill(hover ? (b.hoverFill || b.fill) : b.fill, 1);
          bbg.drawRoundedRect(-btnW / 2, -btnH / 2, btnW, btnH, btnH * 0.3);
          bbg.endFill();
        };
        drawBtnBg(false);
        const btxt = new PIXI.Text(b.label, {
          fontFamily: FONT, fontSize: btnFS, fill: 0xFFFFFF, letterSpacing: 0.5,
        });
        btxt.anchor.set(0.5);
        bcont.addChild(bbg);
        bcont.addChild(btxt);
        bcont.eventMode = 'static';
        bcont.cursor = 'pointer';
        bcont.hitArea = new PIXI.RoundedRectangle(-btnW / 2, -btnH / 2, btnW, btnH, btnH * 0.3);
        bcont.on('pointerover', () => {
          drawBtnBg(true);
          gsap.to(bcont.scale, { x: 1.04, y: 1.04, duration: 0.12 });
        });
        bcont.on('pointerout', () => {
          drawBtnBg(false);
          gsap.to(bcont.scale, { x: 1, y: 1, duration: 0.12 });
        });
        bcont.on('pointertap', () => {
          if (b.onTap) b.onTap(close);
          else close();
        });
        modal.addChild(bcont);
      });

      gsap.to(modal, { alpha: 1, duration: 0.18, ease: 'power2.out' });
      return { modal, close };
    }

    // Free-spin announce/retrigger modal. `isRetrigger` flips the title.
    function openFreeSpinAnnounceModal(spins, isRetrigger) {
      _openSimpleModal({
        title: isRetrigger ? 'Retrigger!' : 'Free Spins!',
        bodyLines: [
          { text: isRetrigger ? 'You earned' : 'You triggered' },
          { text: `+${spins} FREE SPINS`, emphasis: true },
        ],
        buttons: [{
          label: 'PLAY',
          fill: 0x2E7D32, hoverFill: 0x3FA143, stroke: 0x7FE080,
          onTap: (close) => {
            close();
            // Auto-kick the next free spin once the modal has closed.
            // Small delay so the close animation finishes and the spin
            // button isn't busy from any in-flight tween.
            setTimeout(() => {
              if (game.state.freeSpinsBank > 0
                  && scene.spinBtn && !scene.spinBtn.busy
                  && _openSimpleModalCount === 0) {
                onSpinClick();
              }
            }, 200);
          },
        }],
      });
    }

    function openPaytableModal() {
      if (scene.paytableModal) return;
      const modal = new PIXI.Container();
      const sw = L.sw, sh = L.sh;
      const scale = Math.min(1, Math.min(sw / 900, sh / 900));

      // Dimmed backdrop, click-to-close.
      const backdrop = new PIXI.Graphics();

      backdrop.drawRect(0, 0, sw, sh);

      modal.addChild(backdrop);

      // Panel.
